<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Bordeaux Soleil Terrasse</title>

    <style>
        html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        
        /* Style du menu Slider */
        #toolbar {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(42, 42, 42, 0.8);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-family: sans-serif;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <div id="toolbar">
        <label>☀️ Heure du soleil :</label><br>
        <input type="range" id="timeSlider" min="6" max="22" value="14" style="width:200px;">
        <span id="hourLabel">14h</span>
    </div>

            pitch: Cesium.Math.toRadians(-35)
        }
    });

    // --- GESTION DU SLIDER DE SOLEIL ---
    const slider = document.getElementById('timeSlider');
    const label = document.getElementById('hourLabel');

    slider.addEventListener('input', () => {
        const hour = parseInt(slider.value);
        label.innerText = hour + "h";
        
        // On change l'heure de la simulation pour voir les ombres bouger
        const date = new Date();
        date.setHours(hour);
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
    });
