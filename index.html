<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Terrasses · Bordeaux</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sun: #FF9500; --sun-bg: #FFF4E0;
      --shade: #8E9BAD; --shade-bg: #EEF1F5;
      --text: #1C1C1E; --text-2: #6C6C70; --text-3: #AEAEB2;
      --divider: #E5E5EA; --panel-w: 320px;
      --radius-md: 14px; --radius-sm: 10px;
      --glass: rgba(255,255,255,0.82);
      --white: #FFFFFF; --bg: #F2F2F7;
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: #fff; }

    /* ══ SPLASH ══ */
    #splash {
      position: fixed; inset: 0; z-index: 1000;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #splash.out { opacity: 0; pointer-events: none; }

    .splash-sun {
      width: 90px; height: 90px; margin-bottom: 22px;
      animation: splash-pulse 2.5s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%,100% { transform: scale(1) rotate(0deg); }
      50%      { transform: scale(1.07) rotate(6deg); }
    }
    .splash-name { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
    .splash-city { font-size: 13px; color: var(--text-3); letter-spacing: 0.3px; }
    .splash-progress-wrap { position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%); width: 120px; }
    .splash-progress-track { width: 100%; height: 2px; background: #E5E5EA; border-radius: 2px; overflow: hidden; }
    .splash-progress-bar { height: 100%; border-radius: 2px; background: #FFD600; width: 0%; transition: width 0.3s ease; }

    /* ══ MAP ══ */
    #cesiumContainer { position: fixed; inset: 0; width: 100vw; height: 100vh; }
    .cesium-widget canvas { outline: none !important; }
    .cesium-selection-wrapper, .cesium-infoBox { display: none !important; }
    .cesium-widget-credits { display: none !important; }

    /* ══ BARRE RECHERCHE HAUT — glassmorphism ══ */
    #topBar {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 30; width: calc(100% - 32px); max-width: 480px;
      display: flex; align-items: center; gap: 10px;
    }

    .search-glass {
      flex: 1; display: flex; align-items: center; gap: 8px;
      background: var(--glass);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 0 14px;
      height: 48px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .search-glass svg { flex-shrink: 0; opacity: 0.4; }
    #searchInput {
      flex: 1; border: none; background: transparent;
      font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text);
      outline: none;
    }
    #searchInput::placeholder { color: var(--text-3); }
    .search-clear-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 16px; padding: 0;
      display: none; align-items: center; justify-content: center;
      width: 20px; height: 20px;
    }
    .search-clear-btn.visible { display: flex; }

    /* Bouton liste */
    #btnListe {
      flex-shrink: 0;
      width: 48px; height: 48px;
      background: var(--glass);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 14px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #btnListe:active { background: rgba(255,255,255,0.95); }

    /* Bouton géoloc */
    #btnGeo {
      flex-shrink: 0;
      width: 48px; height: 48px;
      background: var(--glass);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 14px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #btnGeo:active { background: rgba(255,255,255,0.95); }
    #btnGeo.locating { animation: geo-pulse 1s ease-in-out infinite; }
    @keyframes geo-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ══ CURSEUR BAS — glassmorphism ══ */
    .panel-map {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--glass);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.5);
      padding: 14px 22px; border-radius: 22px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.7);
      text-align: center; z-index: 30;
      width: 80%; max-width: 400px;
    }
    .panel-map h3 {
      margin: 0 0 10px 0; font-size: 16px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .panel-map input[type=range] {
      width: 100%; cursor: pointer;
      -webkit-appearance: none; height: 3px; border-radius: 2px;
      background: linear-gradient(to right, var(--sun) var(--pct,46%), rgba(0,0,0,0.12) var(--pct,46%));
      outline: none;
    }
    .panel-map input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: white; border: 2.5px solid var(--sun);
      box-shadow: 0 1px 8px rgba(0,0,0,0.15); cursor: pointer;
    }

    /* ══ TOOLTIP ══ */
    #tooltip {
      position: fixed; z-index: 50;
      background: rgba(28,28,30,0.88); color: white;
      padding: 9px 14px; border-radius: 12px;
      font-size: 13px; font-weight: 500;
      pointer-events: none;
      opacity: 0; transform: translateY(5px);
      transition: opacity 0.18s, transform 0.18s;
      backdrop-filter: blur(10px);
      max-width: 230px; text-align: center;
    }
    #tooltip.visible { opacity: 1; transform: translateY(0); }
    #tooltip .tt-type { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 2px; }
    #tooltip .tt-sun  { font-size: 11px; font-weight: 500; margin-top: 4px; }
    #tooltip .tt-sun.sun   { color: #FFB74D; }
    #tooltip .tt-sun.shade { color: #90CAF9; }

    /* ══ DRAWER ══ */
    #drawer {
      position: fixed; z-index: 40; background: var(--white);
      display: flex; flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    @media (min-width: 641px) {
      #drawer { top:0; right:0; width:var(--panel-w); height:100vh; border-left:1px solid var(--divider); transform:translateX(110%); }
      #drawer.open { transform:translateX(0); }
    }
    @media (max-width: 640px) {
      #drawer { left:0; bottom:0; width:100%; height:78vh; border-radius:18px 18px 0 0; border-top:1px solid var(--divider); box-shadow:0 -4px 30px rgba(0,0,0,0.1); transform:translateY(110%); }
      #drawer.open { transform:translateY(0); }
    }
    .drawer-handle { display:none; justify-content:center; padding:10px 0 4px; flex-shrink:0; cursor:pointer; }
    .drawer-bar { width:36px; height:4px; background:var(--divider); border-radius:2px; }
    @media (max-width:640px) { .drawer-handle { display:flex; } }

    .drawer-header { padding:18px 20px 0; flex-shrink:0; }
    .drawer-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .drawer-title { font-size:18px; font-weight:600; color:var(--text); letter-spacing:-0.3px; }
    .drawer-title span { color:var(--sun); }
    #btnClose { background:var(--bg); border:none; border-radius:50%; width:30px; height:30px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-2); }

    .drawer-search-wrap { position:relative; margin-bottom:12px; }
    .drawer-search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-3); font-size:13px; pointer-events:none; }
    #drawerSearch { width:100%; padding:9px 30px 9px 32px; border-radius:var(--radius-sm); border:none; background:var(--bg); font-family:'Outfit',sans-serif; font-size:13px; color:var(--text); outline:none; }
    #drawerSearch::placeholder { color:var(--text-3); }

    .section-title { padding:4px 20px 8px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .section-label { font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:0.8px; }
    .count-pill { font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; background:var(--sun-bg); color:var(--sun); }

    #loadingState { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text-3); font-size:13px; }
    .spinner { width:24px; height:24px; border:2.5px solid var(--divider); border-top-color:var(--sun); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .list { flex:1; overflow-y:auto; padding:0 12px 24px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .list::-webkit-scrollbar { display:none; }
    .card { display:flex; align-items:center; gap:12px; padding:10px 8px; border-radius:var(--radius-md); cursor:pointer; transition:background 0.15s; border-bottom:1px solid var(--divider); }
    .card:last-child { border-bottom:none; }
    .card:active, .card.active { background:var(--bg); border-color:transparent; }
    .card-icon { width:36px; height:36px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .card-icon.sun { background:var(--sun-bg); } .card-icon.shade { background:var(--shade-bg); }
    .card-body { flex:1; min-width:0; }
    .card-name { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
    .card-sub  { font-size:11px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-badge { flex-shrink:0; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; }
    .card-badge.sun { background:var(--sun-bg); color:var(--sun); }
    .card-badge.shade { background:var(--shade-bg); color:var(--shade); }
    .no-results { padding:30px 20px; text-align:center; color:var(--text-3); font-size:13px; line-height:1.6; }

    .drawer-footer { padding:10px 20px; border-top:1px solid var(--divider); display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .footer-text { font-size:10px; color:var(--text-3); }
    .live-dot { width:6px; height:6px; border-radius:50%; background:#30D158; animation:blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="splash">
  <div class="splash-sun">
    <svg viewBox="0 0 100 100" width="90" height="90" xmlns="http://www.w3.org/2000/svg">
      <g fill="#FFD600">
        <ellipse cx="50" cy="11" rx="3.2" ry="7"   transform="rotate(0 50 50)"/>
        <ellipse cx="50" cy="11" rx="2.8" ry="6.5" transform="rotate(40 50 50)"/>
        <ellipse cx="50" cy="11" rx="3.4" ry="7.5" transform="rotate(75 50 50)"/>
        <ellipse cx="50" cy="11" rx="3"   ry="6.8" transform="rotate(110 50 50)"/>
        <ellipse cx="50" cy="11" rx="2.8" ry="6.2" transform="rotate(145 50 50)"/>
        <ellipse cx="50" cy="11" rx="3.3" ry="7.2" transform="rotate(180 50 50)"/>
        <ellipse cx="50" cy="11" rx="2.9" ry="6.5" transform="rotate(215 50 50)"/>
        <ellipse cx="50" cy="11" rx="3.5" ry="7"   transform="rotate(250 50 50)"/>
        <ellipse cx="50" cy="11" rx="2.8" ry="6.3" transform="rotate(285 50 50)"/>
        <ellipse cx="50" cy="11" rx="3.1" ry="7.2" transform="rotate(320 50 50)"/>
      </g>
      <circle cx="50" cy="50" r="21" fill="#FFD600"/>
      <circle cx="48" cy="48" r="17" fill="#FFE000" opacity="0.55"/>
      <circle cx="52" cy="52" r="14" fill="#FFC400" opacity="0.25"/>
    </svg>
  </div>
  <div class="splash-name">Terrasses</div>
  <div class="splash-city">Bordeaux</div>
  <div class="splash-progress-wrap">
    <div class="splash-progress-track">
      <div class="splash-progress-bar" id="progressBar"></div>
    </div>
  </div>
</div>

<!-- ══ MAP ══ -->
<div id="cesiumContainer"></div>

<!-- ══ BARRE HAUT ══ -->
<div id="topBar">
  <div class="search-glass">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="5" stroke="#1C1C1E" stroke-width="1.5"/>
      <path d="M10.5 10.5L14 14" stroke="#1C1C1E" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Bar, café, restaurant…">
    <button class="search-clear-btn" id="searchClear">✕</button>
  </div>
  <button id="btnListe" onclick="openDrawer()" title="Liste des terrasses">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
      <rect width="18" height="2" rx="1" fill="#1C1C1E"/>
      <rect y="6" width="18" height="2" rx="1" fill="#1C1C1E"/>
      <rect y="12" width="18" height="2" rx="1" fill="#1C1C1E"/>
    </svg>
  </button>
  <button id="btnGeo" onclick="geolocate()" title="Ma position">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="3.5" fill="#007AFF"/>
      <circle cx="10" cy="10" r="3.5" fill="#007AFF" opacity="0.3" transform="scale(2.2)" style="transform-origin:10px 10px"/>
      <path d="M10 2V4M10 16V18M2 10H4M16 10H18" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<!-- ══ CURSEUR BAS ══ -->
<div class="panel-map">
  <h3>☀️ <span id="heureAffichee">14h00</span></h3>
  <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25">
</div>

<!-- ══ TOOLTIP ══ -->
<div id="tooltip">
  <div id="ttName"></div>
  <div class="tt-type" id="ttType"></div>
  <div class="tt-sun" id="ttSun"></div>
</div>

<!-- ══ DRAWER ══ -->
<div id="drawer">
  <div class="drawer-handle" id="drawerHandle"><div class="drawer-bar"></div></div>
  <div class="drawer-header">
    <div class="drawer-top">
      <div class="drawer-title">Terrasses<span>.</span></div>
      <button id="btnClose" onclick="closeDrawer()">✕</button>
    </div>
  </div>
  <div class="section-title">
    <span class="section-label">Résultats</span>
    <span class="count-pill" id="sunCount">…</span>
  </div>
  <div id="loadingState"><div class="spinner"></div><span>Chargement…</span></div>
  <div class="list" id="terrasseList" style="display:none;"></div>
  <div class="drawer-footer">
    <div class="live-dot"></div>
    <span class="footer-text" id="footerText">Ombres 3D · OpenStreetMap</span>
  </div>
</div>

<script>
// ══ DRAWER ══
const drawer = document.getElementById('drawer');
function openDrawer()  { drawer.classList.add('open'); }
function closeDrawer() { drawer.classList.remove('open'); }
const dhandle = document.getElementById('drawerHandle');
let ty0 = 0;
dhandle.addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; }, { passive:true });
dhandle.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - ty0 > 50) closeDrawer(); }, { passive:true });

// ══ SPLASH ══
const progressBar = document.getElementById('progressBar');
let splashDone = false, progress = 0;
const progressInterval = setInterval(() => {
  if (progress < 85) { progress += Math.random() * 8; progressBar.style.width = Math.min(progress, 85) + '%'; }
}, 200);

function completeSplash() {
  if (splashDone) return; splashDone = true;
  clearInterval(progressInterval);
  progressBar.style.transition = 'width 0.4s ease';
  progressBar.style.width = '100%';
  setTimeout(() => {
    document.getElementById('splash').classList.add('out');
    setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 550);
  }, 350);
}
setTimeout(completeSplash, 5000);

// ══ CESIUM ══
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

const viewer = new Cesium.Viewer('cesiumContainer', {
  terrainProvider: Cesium.createWorldTerrain(),
  skyBox: false, skyAtmosphere: false,
  baseLayerPicker: false, homeButton: false,
  infoBox: false, selectionIndicator: false,
  navigationHelpButton: false, sceneModePicker: false,
  animation: false, timeline: false,
  fullscreenButton: false, geocoder: false,
  scene3DOnly: true,
});

viewer.scene.globe.maximumScreenSpaceError = 2;
viewer.scene.globe.tileCacheSize = 200;
viewer.scene.globe.preloadAncestors = true;
viewer.scene.globe.enableLighting = true;
viewer.shadows = true;
viewer.scene.screenSpaceCameraController.enableZoom = true;
viewer.scene.screenSpaceCameraController.enableRotate = true;
viewer.scene.screenSpaceCameraController.enableTilt = true;
viewer.scene.screenSpaceCameraController.enableTranslate = true;

// Vue par défaut — Bordeaux centre (fallback si pas de géoloc)
const DEFAULT_LNG = -0.57918, DEFAULT_LAT = 44.837789;
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(DEFAULT_LNG, DEFAULT_LAT, 500),
  orientation: { heading: 0, pitch: Cesium.Math.toRadians(-45), roll: 0 }
});

// Bâtiments OSM après stabilisation
let osmAdded = false;
viewer.scene.postRender.addEventListener(function waitGlobe() {
  if (viewer.scene.globe.tilesLoaded && !osmAdded) {
    osmAdded = true;
    viewer.scene.postRender.removeEventListener(waitGlobe);
    const osm = viewer.scene.primitives.add(Cesium.createOsmBuildings());
    osm.maximumScreenSpaceError = 6;
    completeSplash();
  }
});

// ══ GÉOLOCALISATION ══
let userPosition = null;
let userDot = null;

function geolocate() {
  if (!navigator.geolocation) return;
  const btn = document.getElementById('btnGeo');
  btn.classList.add('locating');

  navigator.geolocation.getCurrentPosition(pos => {
    btn.classList.remove('locating');
    const lng = pos.coords.longitude, lat = pos.coords.latitude;
    userPosition = { lng, lat };

    // Fly vers la position
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(lng, lat, 400),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-45), roll: 0 },
      duration: 1.8
    });

    // Dot bleu position utilisateur
    if (userDot) viewer.entities.remove(userDot);
    userDot = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lng, lat, 3),
      billboard: {
        image: makeUserDot(),
        verticalOrigin: Cesium.VerticalOrigin.CENTER,
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        width: 20, height: 20,
        disableDepthTestDistance: Number.POSITIVE_INFINITY
      }
    });
  }, () => { btn.classList.remove('locating'); }, { enableHighAccuracy: true, timeout: 8000 });
}

function makeUserDot() {
  const c = document.createElement('canvas'); c.width = 20; c.height = 20;
  const ctx = c.getContext('2d');
  // Halo bleu
  ctx.beginPath(); ctx.arc(10,10,9,0,Math.PI*2);
  ctx.fillStyle = 'rgba(0,122,255,0.2)'; ctx.fill();
  // Cercle blanc
  ctx.beginPath(); ctx.arc(10,10,6,0,Math.PI*2);
  ctx.fillStyle = 'white'; ctx.fill();
  // Point bleu
  ctx.beginPath(); ctx.arc(10,10,4,0,Math.PI*2);
  ctx.fillStyle = '#007AFF'; ctx.fill();
  return c.toDataURL();
}

// Géoloc automatique au démarrage
window.addEventListener('load', () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const lng = pos.coords.longitude, lat = pos.coords.latitude;
      userPosition = { lng, lat };
      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(lng, lat, 500),
        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-45), roll: 0 }
      });
      if (userDot) viewer.entities.remove(userDot);
      userDot = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(lng, lat, 3),
        billboard: {
          image: makeUserDot(),
          verticalOrigin: Cesium.VerticalOrigin.CENTER,
          heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
          width: 20, height: 20,
          disableDepthTestDistance: Number.POSITIVE_INFINITY
        }
      });
    }, () => {}, { enableHighAccuracy: false, timeout: 5000 });
  }
});

// ══ STATE ══
let terrasses = [], sunStates = {}, searchQuery = '', currentHeure = 14;
const markerEntities = {};

// ══ OVERPASS ══
const BBOX = '44.820,-0.605,44.875,-0.535';
const QUERY = `[out:json][timeout:30];
(
  node["amenity"="bar"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="cafe"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="restaurant"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="pub"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="biergarten"](${BBOX});
  node["amenity"="bar"](${BBOX});
  node["amenity"="cafe"](${BBOX});
  node["amenity"="restaurant"](${BBOX});
);
out body;`;

function typeLabel(a) {
  return { bar:'Bar', cafe:'Café', restaurant:'Restaurant', pub:'Pub', biergarten:'Brasserie' }[a] || 'Terrasse';
}

async function fetchTerrasses() {
  const res = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:'data='+encodeURIComponent(QUERY) });
  if (!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  const seen = new Set();
  return data.elements
    .filter(el => el.lat && el.lon && el.tags && el.tags.name && !seen.has(el.tags.name) && seen.add(el.tags.name))
    .map(el => ({
      id: el.id, nom: el.tags.name,
      adresse: el.tags['addr:street'] ? ((el.tags['addr:housenumber']||'')+' '+el.tags['addr:street']).trim() : 'Bordeaux',
      type: typeLabel(el.tags.amenity), lng: el.lon, lat: el.lat,
    }));
}

// ══ RAY CASTING ══
function getSunDir(jd) {
  const s = Cesium.Simon1994PlanetaryPositions.computeSunPositionInEarthInertialFrame(jd);
  const m = Cesium.Transforms.computeIcrfToFixedMatrix(jd);
  if (!m) return null;
  const d = new Cesium.Cartesian3();
  Cesium.Matrix3.multiplyByVector(m, s, d);
  return Cesium.Cartesian3.normalize(d, d);
}

function checkSunny(t, sunDir) {
  if (!sunDir) return false;
  const pos = Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 1.5);
  const up  = Cesium.Cartesian3.normalize(pos, new Cesium.Cartesian3());
  if (Cesium.Cartesian3.dot(sunDir, up) <= 0.05) return false;
  return !viewer.scene.pickFromRay(new Cesium.Ray(pos, sunDir), Object.values(markerEntities));
}

let shadowDebounce = null, computing = false;
function scheduleShadow() {
  clearTimeout(shadowDebounce);
  shadowDebounce = setTimeout(() => {
    const unsub = viewer.scene.postRender.addEventListener(() => { unsub(); if (!computing) runShadow(); });
  }, 500);
}

async function runShadow() {
  computing = true;
  const jd = viewer.clock.currentTime;
  viewer.scene.render(jd);
  const sunDir = getSunDir(jd);
  for (let i = 0; i < terrasses.length; i += 10) {
    viewer.scene.render(jd);
    for (const t of terrasses.slice(i, i+10)) sunStates[t.id] = checkSunny(t, sunDir);
    syncDots(); renderList(currentHeure, searchQuery);
    await new Promise(r => setTimeout(r, 0));
  }
  computing = false;
}

// ══ DOTS ══
function makeDot(sunny) {
  const c = document.createElement('canvas'); c.width = 16; c.height = 16;
  const ctx = c.getContext('2d');
  ctx.beginPath(); ctx.arc(8,8,7,0,Math.PI*2); ctx.fillStyle = sunny?'rgba(255,149,0,0.2)':'rgba(142,155,173,0.15)'; ctx.fill();
  ctx.beginPath(); ctx.arc(8,8,4,0,Math.PI*2); ctx.fillStyle = sunny?'#FF9500':'#8E9BAD'; ctx.fill();
  ctx.beginPath(); ctx.arc(8,8,4,0,Math.PI*2); ctx.strokeStyle='white'; ctx.lineWidth=1.5; ctx.stroke();
  return c.toDataURL();
}
const DOT_SUN = makeDot(true), DOT_SHADE = makeDot(false);

function syncDots() {
  terrasses.forEach(t => {
    const s = sunStates[t.id]===true;
    if (!markerEntities[t.id]) {
      markerEntities[t.id] = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 2),
        billboard: { image:s?DOT_SUN:DOT_SHADE, verticalOrigin:Cesium.VerticalOrigin.CENTER, heightReference:Cesium.HeightReference.RELATIVE_TO_GROUND, width:16, height:16, disableDepthTestDistance:Number.POSITIVE_INFINITY },
        properties: { id: t.id }
      });
    } else { markerEntities[t.id].billboard.image = s?DOT_SUN:DOT_SHADE; }
  });
}

// ══ TOOLTIP ══
const tooltip = document.getElementById('tooltip');
let ttTimeout = null;
function showTooltip(t, x, y) {
  const s = sunStates[t.id]===true;
  document.getElementById('ttName').textContent = t.nom;
  document.getElementById('ttType').textContent = t.type+' · '+t.adresse;
  const el = document.getElementById('ttSun');
  el.textContent = s?'☀ Au soleil':'🌥 À l\'ombre';
  el.className = 'tt-sun '+(s?'sun':'shade');
  const w = 230;
  tooltip.style.left = Math.min(Math.max(x-w/2,10), window.innerWidth-w-10)+'px';
  tooltip.style.top  = Math.max(y-100,10)+'px';
  tooltip.classList.add('visible');
  clearTimeout(ttTimeout);
  ttTimeout = setTimeout(()=>tooltip.classList.remove('visible'), 3000);
}
function hideTooltip() { clearTimeout(ttTimeout); tooltip.classList.remove('visible'); }

// ══ HELPERS ══
function normalize(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function highlight(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),
    '<mark style="background:var(--sun-bg);color:var(--sun);border-radius:3px;padding:0 2px">$1</mark>');
}

// ══ RENDER LIST ══
function renderList(h, query) {
  const list=document.getElementById('terrasseList'), countEl=document.getElementById('sunCount');
  const q=normalize(query||'');
  let filtered=terrasses;
  if (q) filtered=terrasses.filter(t=>normalize(t.nom).includes(q)||normalize(t.type).includes(q)||normalize(t.adresse).includes(q));
  const sorted=[...filtered].sort((a,b)=>(sunStates[b.id]?1:0)-(sunStates[a.id]?1:0));
  countEl.textContent=q?`${sorted.length} résultat${sorted.length>1?'s':''}`:  `${sorted.filter(t=>sunStates[t.id]===true).length} au soleil`;
  list.innerHTML='';
  if (!sorted.length) { list.innerHTML=`<div class="no-results">Aucun résultat pour<br><strong>"${query}"</strong></div>`; return; }
  sorted.forEach(t=>{
    const s=sunStates[t.id]===true;
    const card=document.createElement('div'); card.className='card'; card.dataset.id=t.id;
    card.innerHTML=`
      <div class="card-icon ${s?'sun':'shade'}">${s?'☀️':'🌥'}</div>
      <div class="card-body">
        <div class="card-name">${highlight(t.nom,query)}</div>
        <div class="card-sub">${t.type} · ${t.adresse}</div>
      </div>
      <div class="card-badge ${s?'sun':'shade'}">${s?'Soleil':'Ombre'}</div>
    `;
    card.addEventListener('click',()=>{
      document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
      card.classList.add('active'); closeDrawer();
      viewer.camera.flyTo({ destination:Cesium.Cartesian3.fromDegrees(t.lng,t.lat,220), orientation:{heading:0,pitch:Cesium.Math.toRadians(-38),roll:0}, duration:1.4 });
    });
    list.appendChild(card);
  });
}

// ══ SEARCH ══
const searchInput=document.getElementById('searchInput'), searchClear=document.getElementById('searchClear');
searchInput.addEventListener('input', e => {
  searchQuery = e.target.value;
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  renderList(currentHeure, searchQuery);
  if (searchQuery.length > 0) openDrawer();
});
searchClear.addEventListener('click', () => {
  searchInput.value=''; searchQuery='';
  searchClear.classList.remove('visible');
  renderList(currentHeure,'');
});

// ══ SLIDER ══
const slider=document.getElementById('timeSlider');
slider.addEventListener('input', e => {
  const val=parseFloat(e.target.value), h=Math.floor(val), m=Math.round((val-h)*60);
  document.getElementById('heureAffichee').textContent=h+'h'+(m<10?'0'+m:m);
  slider.style.setProperty('--pct',((val-8)/13)*100+'%');
  const date=new Date(); date.setHours(h,m,0,0);
  viewer.clock.currentTime=Cesium.JulianDate.fromDate(date);
  currentHeure=val; hideTooltip();
  if(terrasses.length>0) scheduleShadow();
});

// ══ CLICK DOT ══
const handler=new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
handler.setInputAction(click=>{
  const picked=viewer.scene.pick(click.position);
  if(Cesium.defined(picked)&&picked.id){
    const id=picked.id.properties?.id?.getValue();
    const t=terrasses.find(x=>String(x.id)===String(id));
    if(t){ showTooltip(t,click.position.x,click.position.y); return; }
  }
  hideTooltip();
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

// ══ BOOT ══
async function init() {
  const now=new Date();
  const initH=Math.min(21,Math.max(8,now.getHours()+(Math.round(now.getMinutes()/15)*15/60)));
  slider.value=initH; slider.dispatchEvent(new Event('input'));

  let data;
  try { data=await fetchTerrasses(); }
  catch(e) {
    document.getElementById('loadingState').style.display='none';
    document.getElementById('terrasseList').style.display='block';
    document.getElementById('terrasseList').innerHTML=`<div class="no-results">Erreur de chargement.<br>Vérifiez votre connexion.</div>`;
    return;
  }
  document.getElementById('loadingState').style.display='none';
  document.getElementById('terrasseList').style.display='block';
  terrasses=data; terrasses.forEach(t=>{ sunStates[t.id]=false; });
  document.getElementById('footerText').textContent=`${terrasses.length} terrasses · OpenStreetMap`;
  renderList(currentHeure,'');

  viewer.scene.postRender.addEventListener(function once(){
    viewer.scene.postRender.removeEventListener(once);
    runShadow();
  });
}

init();
</script>
