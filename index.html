<!DOCTYPE html>
<html>
<head>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    #cesiumContainer { width: 100vw; height: 100vh; }
    .panel {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: white; padding: 12px 20px; border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 10; font-family: sans-serif;
    }
    /* STYLE DES ÉTIQUETTES (FIXES SUR L'ÉCRAN) */
    .label-auto {
      position: absolute;
      background: rgba(255, 255, 255, 0.95);
      padding: 4px 8px;
      border-radius: 6px;
      border: 1.5px solid #333;
      font-family: sans-serif;
      font-size: 13px;
      font-weight: bold;
      pointer-events: none;
      white-space: nowrap;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div class="panel">
    <div style="font-weight: bold; margin-bottom: 5px;">☀️ <span id="heureAffichee">14h00</span></div>
    <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25" style="width:200px;">
  </div>

<script>
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';
  
  const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.createWorldTerrain(),
      infoBox: false, selectionIndicator: false,
      baseLayerPicker: false, skyBox: false, skyAtmosphere: false,
      navigationHelpButton: false, sceneModePicker: false, timeline: false, animation: false,
      geocoder: false, homeButton: false
  });

  viewer.scene.globe.enableLighting = true;
  viewer.shadows = true;
  viewer.scene.primitives.add(Cesium.createOsmBuildings());

  // --- CONFIGURATION DES MARQUEURS ---
  const pointsInteret = [
    { nom: "L'Avant Comptoir", lat: 44.83842, lng: -0.56930 },
    { nom: "Les Frères Cailloux", lat: 44.83872, lng: -0.56905 }
  ];

  pointsInteret.forEach(p => {
    // 1. On crée l'épingle rouge
    p.entity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(p.lng, p.lat),
      billboard: {
        image: 'https://img.icons8.com/color/96/marker.png',
        width: 30, height: 30,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        disableDepthTestDistance: Number.POSITIVE_INFINITY
      }
    });

    // 2. On crée l'étiquette HTML
    const div = document.createElement('div');
    div.className = 'label-auto';
    div.innerHTML = p.nom;
    document.body.appendChild(div);
    p.element = div;
  });

  // --- MISE À JOUR DE LA POSITION (L'aimant écran) ---
  viewer.scene.postRender.addEventListener(function() {
    pointsInteret.forEach(p => {
      const position = p.entity.position.getValue(viewer.clock.currentTime);
      const canvasPos = viewer.scene.cartesianToCanvasCoordinates(position);
      
      if (Cesium.defined(canvasPos)) {
        p.element.style.display = "block";
        // On centre l'étiquette pile au-dessus (offset de 40px vers le haut)
        p.element.style.left = (canvasPos.x - p.element.offsetWidth / 2) + "px";
        p.element.style.top = (canvasPos.y - 45) + "px";
      } else {
        p.element.style.display = "none";
      }
    });
  });

  viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(-0.5692, 44.8385, 120),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-35), roll: 0 }
  });

  const slider = document.getElementById('timeSlider');
  slider.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      const h = Math.floor(val);
      const m = Math.round((val - h) * 60);
      document.getElementById('heureAffichee').innerText = h + "h" + (m < 10 ? '0' + m : m);
      const d = new Date(); d.setHours(h, m, 0, 0);
      viewer.clock.currentTime = Cesium.JulianDate.fromDate(d);
  });
</script>
</body>
</html>
