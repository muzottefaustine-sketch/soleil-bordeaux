<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Bordeaux Soleil Terrasse - Version Stable</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #toolbar {
            position: absolute; top: 10px; left: 10px; background: rgba(42, 42, 42, 0.8);
            padding: 15px; border-radius: 8px; color: white; font-family: sans-serif; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <div id="toolbar">
        <label>☀️ Heure du soleil :</label><br>
        <input type="range" id="timeSlider" min="6" max="22" value="14" style="width:200px;">
        <span id="hourLabel">14h</span>
    </div>

<script>
    // --- TA CLÉ CESIUM ION ---
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI0YmE0YzRhOC1lYmE3LTQ4MDktOGFlMy02YmI4Y2E4YjE0YjUiLCJpZCI6MjM5MzY5LCJpYXQiOjE3MDk4NDg0NDN9.ZHU4X0S_O1I6ZpS5Jk8f_XwP6NqY5u7sBjw-qXs';

    // Initialisation du viewer
    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: Cesium.createWorldTerrain(),
        shadows: true,
        shouldAnimate: true,
        animation: false,
        timeline: false
    });

    // Ajout des bâtiments 3D pour voir les ombres portées
    const buildings = viewer.scene.primitives.add(Cesium.createOsmBuildings());

    // Positionner la caméra sur le centre de Bordeaux (Miroir d'eau)
    viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(-0.57918, 44.837789, 800),
        orientation: {
            pitch: Cesium.Math.toRadians(-35)
        }
    });

    // --- GESTION DU SOLEIL ---
    const slider = document.getElementById('timeSlider');
    slider.addEventListener('input', () => {
        const hour = parseInt(slider.value);
        document.getElementById('hourLabel').innerText = hour + "h";
        
        // On règle l'heure de la scène
        const date = new Date();
        date.setHours(hour);
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
    });

    // --- AJOUT MANUEL DE QUELQUES POINTS TESTS ---
    const terrasses = [
        { name: "Terrasse Test 1", lat: 44.837, lon: -0.579 },
        { name: "Terrasse Test 2", lat: 44.841, lon: -0.570 }
    ];

    terrasses.forEach(t => {
        viewer.entities.add({
            name: t.name,
            position: Cesium.Cartesian3.fromDegrees(t.lon, t.lat),
            point: {
                pixelSize: 12,
                color: Cesium.Color.GOLD,
                outlineColor: Cesium.Color.BLACK,
                outlineWidth: 2,
                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
            }
        });
    });

</script>
</body>
</html>
