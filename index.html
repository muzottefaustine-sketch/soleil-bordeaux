<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #e0e0e0; }
        #cesiumContainer { width: 100vw; height: 100vh; }
        .panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div class="panel">
        <h3 style="margin:0; font-family:sans-serif; color:#d4a017;">☀️ <span id="heureAffichee">14h00</span></h3>
        <input type="range" id="timeSlider" min="8" max="21" step="0.25" style="width:200px;">
    </div>

<script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: Cesium.createWorldTerrain(),
        baseLayerPicker: false, infoBox: false, skyBox: false, skyAtmosphere: false,
        navigationHelpButton: false, sceneModePicker: false, timeline: false, animation: false
    });

    viewer.shadows = true;
    viewer.scene.globe.enableLighting = true;

    // --- STYLE MAQUETTE BEIGE (Pierre de Bordeaux) ---
    const buildings = viewer.scene.primitives.add(Cesium.createOsmBuildings());
    buildings.style = new Cesium.Cesium3DTileStyle({
        color: "color('#F5F5DC')", // Beige clair
        show: true
    });

    // --- MARQUEURS TRÈS VISIBLES ---
    const points = [
        { name: "L'AVANT COMPTOIR", lat: 44.83842, lng: -0.56930 },
        { name: "LES FRÈRES CAILLOUX", lat: 44.83868, lng: -0.56900 }
    ];

    points.forEach(p => {
        viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(p.lng, p.lat, 2),
            point: { pixelSize: 15, color: Cesium.Color.ORANGE, outlineColor: Cesium.Color.WHITE, outlineWidth: 3 },
            label: {
                text: p.name, font: 'bold 14px sans-serif',
                fillColor: Cesium.Color.BLACK, outlineColor: Cesium.Color.WHITE, outlineWidth: 3,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                pixelOffset: new Cesium.Cartesian2(0, -20),
                disableDepthTestDistance: Number.POSITIVE_INFINITY
            }
        });
    });

    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(-0.5691, 44.8384, 150),
        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-35), roll: 0 }
    });

    const slider = document.getElementById('timeSlider');
    slider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        const h = Math.floor(val);
        const m = Math.round((val - h) * 60);
        document.getElementById('heureAffichee').innerText = h + "h" + (m < 10 ? '0'+m : m);
        const d = new Date(); d.setHours(h, m, 0, 0);
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(d);
    });

    const maintenant = new Date();
    slider.value = maintenant.getHours();
    slider.dispatchEvent(new Event('input'));
</script>
</body>
</html>
