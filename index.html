<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Terrasses · Bordeaux</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sun: #FF9500; --sun-bg: #FFF4E0;
      --shade: #8E9BAD; --shade-bg: #EEF1F5;
      --text: #1C1C1E; --text-2: #6C6C70; --text-3: #AEAEB2;
      --divider: #E5E5EA; --panel-w: 320px;
      --radius-md: 14px; --radius-sm: 10px;
      --white: #FFFFFF; --bg: #F2F2F7;
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; }

    /* MAP toujours plein écran en arrière-plan */
    #cesiumContainer { position: fixed; inset: 0; width: 100vw; height: 100vh; }

    /* ── DESKTOP : sidebar gauche ── */
    #panel {
      position: fixed; left: 0; top: 0;
      width: var(--panel-w); height: 100vh;
      background: var(--white);
      display: flex; flex-direction: column;
      z-index: 20; border-right: 1px solid var(--divider);
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      #panel {
        left: 0; top: auto; bottom: 0;
        width: 100vw; height: auto;
        border-right: none;
        border-top: 1px solid var(--divider);
        border-radius: 18px 18px 0 0;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        /* Hauteur par défaut : juste le curseur */
        max-height: 130px;
        transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
        overflow: hidden;
      }
      #panel.expanded { max-height: 80vh; }

      /* Cacher tout sauf le minimal en mode replié */
      #panel:not(.expanded) .search-wrap,
      #panel:not(.expanded) .section-title,
      #panel:not(.expanded) #terrasseList,
      #panel:not(.expanded) #loadingState,
      #panel:not(.expanded) .panel-footer,
      #panel:not(.expanded) .header-top { display: none !important; }
    }

    /* Handle */
    .drawer-handle {
      display: none;
      justify-content: center; align-items: center;
      padding: 10px 0 2px; cursor: pointer; flex-shrink: 0;
      gap: 8px;
    }
    .drawer-bar { width: 36px; height: 4px; background: var(--divider); border-radius: 2px; }
    .drawer-label { font-size: 11px; color: var(--text-3); font-weight: 500; }

    @media (max-width: 640px) { .drawer-handle { display: flex; } }

    /* HEADER */
    .header { padding: 16px 20px 0; flex-shrink: 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .app-name { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
    .app-name span { color: var(--sun); }
    .city-tag { font-size: 11px; font-weight: 500; color: var(--text-2); background: var(--bg); padding: 3px 9px; border-radius: 20px; }

    /* TIME */
    .time-widget { background: var(--bg); border-radius: var(--radius-md); padding: 11px 14px; margin-bottom: 10px; }
    .time-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .time-value { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -1px; line-height: 1; }
    .time-phase { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: var(--sun); background: var(--sun-bg); padding: 4px 9px; border-radius: 20px; }
    .sun-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sun); }
    .slider-ends { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); font-weight: 500; margin-bottom: 4px; }
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px; border-radius: 2px;
      background: linear-gradient(to right, var(--sun) var(--pct, 46%), var(--divider) var(--pct, 46%));
      outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: var(--white); border: 2.5px solid var(--sun);
      box-shadow: 0 1px 8px rgba(0,0,0,0.15); cursor: pointer; transition: transform 0.1s;
    }
    input[type=range]:active::-webkit-slider-thumb { transform: scale(1.2); }

    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 13px; pointer-events: none; }
    #searchInput {
      width: 100%; padding: 8px 30px 8px 30px;
      border-radius: var(--radius-sm); border: 1.5px solid var(--divider);
      background: var(--bg); font-family: 'Outfit', sans-serif;
      font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s;
    }
    #searchInput::placeholder { color: var(--text-3); }
    #searchInput:focus { border-color: var(--sun); background: var(--white); }
    .search-clear {
      position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
      background: var(--text-3); color: white; border: none; border-radius: 50%;
      width: 16px; height: 16px; font-size: 10px; cursor: pointer;
      display: none; align-items: center; justify-content: center;
    }
    .search-clear.visible { display: flex; }

    /* SECTION */
    .section-title { padding: 2px 20px 6px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .section-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; }
    .count-pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--sun-bg); color: var(--sun); }

    /* LOADING */
    #loadingState { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-3); font-size: 13px; min-height: 80px; }
    .spinner { width: 24px; height: 24px; border: 2.5px solid var(--divider); border-top-color: var(--sun); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* LIST */
    .list { flex: 1; overflow-y: auto; padding: 0 12px 16px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .list::-webkit-scrollbar { display: none; }
    .card { display: flex; align-items: center; gap: 10px; padding: 9px 8px; border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--divider); }
    .card:last-child { border-bottom: none; }
    .card:hover, .card.active { background: var(--bg); border-color: transparent; }
    .card-icon { width: 34px; height: 34px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .card-icon.sun { background: var(--sun-bg); }
    .card-icon.shade { background: var(--shade-bg); }
    .card-body { flex: 1; min-width: 0; }
    .card-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
    .card-sub { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-badge { flex-shrink: 0; font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 20px; }
    .card-badge.sun { background: var(--sun-bg); color: var(--sun); }
    .card-badge.shade { background: var(--shade-bg); color: var(--shade); }
    .no-results { padding: 24px 20px; text-align: center; color: var(--text-3); font-size: 13px; line-height: 1.6; }

    /* FOOTER */
    .panel-footer { padding: 9px 20px; border-top: 1px solid var(--divider); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .footer-text { font-size: 10px; color: var(--text-3); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #30D158; animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .cesium-widget-credits { display: none !important; }
  </style>
</head>
<body>

<div id="cesiumContainer"></div>

<div id="panel">
  <div class="drawer-handle" id="drawerHandle">
    <div class="drawer-bar"></div>
  </div>

  <div class="header">
    <div class="header-top">
      <div class="app-name">Terrasses<span>.</span></div>
      <div class="city-tag">Bordeaux</div>
    </div>
    <div class="time-widget">
      <div class="time-row">
        <div class="time-value" id="heureAffichee">14h00</div>
        <div class="time-phase"><div class="sun-dot"></div><span id="sunPhase">Après-midi</span></div>
      </div>
      <div class="slider-ends"><span>8h</span><span>21h</span></div>
      <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25">
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher un bar, resto…">
      <button class="search-clear" id="searchClear">✕</button>
    </div>
  </div>

  <div class="section-title">
    <span class="section-label">Terrasses</span>
    <span class="count-pill" id="sunCount">…</span>
  </div>

  <div id="loadingState">
    <div class="spinner"></div>
    <span>Chargement…</span>
  </div>

  <div class="list" id="terrasseList" style="display:none;"></div>

  <div class="panel-footer">
    <div class="live-dot"></div>
    <span class="footer-text" id="footerText">Ombres 3D Cesium · OpenStreetMap</span>
  </div>
</div>

<script>
  // ── MOBILE DRAWER ──
  const panel = document.getElementById('panel');
  document.getElementById('drawerHandle').addEventListener('click', () => {
    panel.classList.toggle('expanded');
  });

  // ── CESIUM ──
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

  const viewer = new Cesium.Viewer('cesiumContainer', {
    terrainProvider: Cesium.createWorldTerrain(),
    skyBox: false,
    skyAtmosphere: false,
    baseLayerPicker: false,
    homeButton: false,
    infoBox: false,
    navigationHelpButton: false,
    sceneModePicker: false,
    animation: false,
    timeline: false,
    fullscreenButton: false,
    geocoder: false,
    scene3DOnly: true
  });

  viewer.scene.screenSpaceCameraController.enableZoom = true;
  viewer.scene.screenSpaceCameraController.enableRotate = true;
  viewer.scene.screenSpaceCameraController.enableTilt = true;
  viewer.scene.screenSpaceCameraController.enableTranslate = true;
  viewer.scene.globe.enableLighting = true;
  viewer.shadows = true;

  // Bâtiments OSM 3D — nécessaires pour le ray casting des ombres
  const osmBuildings = viewer.scene.primitives.add(Cesium.createOsmBuildings());

  // Vue initiale sur Bordeaux
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(-0.5792, 44.8378, 600),
    orientation: { heading: Cesium.Math.toRadians(0), pitch: Cesium.Math.toRadians(-45), roll: 0 }
  });

  // ── STATE ──
  let terrasses = [];
  let sunStates = {};   // id → true | false
  let searchQuery = '';
  let currentHeure = 14;
  const markerEntities = {};  // id → entity (seulement les terrasses au soleil)

  // ── OVERPASS ──
  const BBOX = '44.820,-0.605,44.875,-0.535';
  const QUERY = `[out:json][timeout:30];
(
  node["amenity"="bar"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="cafe"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="restaurant"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="pub"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="biergarten"](${BBOX});
  node["amenity"="bar"](${BBOX});
  node["amenity"="cafe"](${BBOX});
  node["amenity"="restaurant"](${BBOX});
);
out body;`;

  function typeLabel(a) {
    return { bar:'Bar', cafe:'Café', restaurant:'Restaurant', pub:'Pub', biergarten:'Brasserie' }[a] || 'Terrasse';
  }

  async function fetchTerrasses() {
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: 'data=' + encodeURIComponent(QUERY)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const seen = new Set();
    return data.elements
      .filter(el => el.lat && el.lon && el.tags && el.tags.name && !seen.has(el.tags.name) && seen.add(el.tags.name))
      .map(el => ({
        id: el.id,
        nom: el.tags.name,
        adresse: el.tags['addr:street']
          ? ((el.tags['addr:housenumber'] || '') + ' ' + el.tags['addr:street']).trim()
          : 'Bordeaux',
        type: typeLabel(el.tags.amenity),
        lng: el.lon,
        lat: el.lat,
      }));
  }

  // ── RAY CASTING ──
  function getSunDir(jd) {
    const sunIcrf = Cesium.Simon1994PlanetaryPositions.computeSunPositionInEarthInertialFrame(jd);
    const mtx = Cesium.Transforms.computeIcrfToFixedMatrix(jd);
    if (!mtx) return null;
    const dir = new Cesium.Cartesian3();
    Cesium.Matrix3.multiplyByVector(mtx, sunIcrf, dir);
    return Cesium.Cartesian3.normalize(dir, dir);
  }

  function checkSunny(t, sunDir) {
    if (!sunDir) return false;
    const pos = Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 1.5);
    const up = Cesium.Cartesian3.normalize(pos, new Cesium.Cartesian3());
    if (Cesium.Cartesian3.dot(sunDir, up) <= 0.05) return false; // nuit
    const ray = new Cesium.Ray(pos, sunDir);
    // Exclure les markers pour ne tester que les bâtiments
    const hit = viewer.scene.pickFromRay(ray, Object.values(markerEntities));
    return !hit;
  }

  let shadowDebounce = null;
  let computing = false;

  function scheduleShadow() {
    clearTimeout(shadowDebounce);
    shadowDebounce = setTimeout(() => {
      const unsub = viewer.scene.postRender.addEventListener(() => {
        unsub();
        if (!computing) runShadow();
      });
    }, 500);
  }

  async function runShadow() {
    computing = true;
    const jd = viewer.clock.currentTime;
    viewer.scene.render(jd);
    const sunDir = getSunDir(jd);

    const BATCH = 10;
    for (let i = 0; i < terrasses.length; i += BATCH) {
      viewer.scene.render(jd);
      for (const t of terrasses.slice(i, i + BATCH)) {
        sunStates[t.id] = checkSunny(t, sunDir);
      }
      // Mettre à jour les markers : afficher seulement les terrasses au soleil
      syncMarkers();
      renderList(currentHeure, searchQuery);
      await new Promise(r => setTimeout(r, 0));
    }
    computing = false;
  }

  // ── MARKERS : seulement les terrasses au soleil ──
  function makePin() {
    const c = document.createElement('canvas');
    c.width = 36; c.height = 46;
    const ctx = c.getContext('2d');
    const cx = 18, r = 13;
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;
    ctx.beginPath(); ctx.arc(cx, r + 1, r, 0, Math.PI * 2);
    ctx.fillStyle = '#FF9500'; ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.beginPath(); ctx.moveTo(cx - 5, r + 11); ctx.lineTo(cx + 5, r + 11); ctx.lineTo(cx, 44);
    ctx.closePath(); ctx.fillStyle = '#FF9500'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, r + 1, r - 4, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill();
    ctx.font = '11px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('☀️', cx, r + 1);
    return c.toDataURL();
  }

  const PIN_IMAGE = null; // sera généré une fois

  function syncMarkers() {
    terrasses.forEach(t => {
      const sunny = sunStates[t.id] === true;
      const exists = !!markerEntities[t.id];

      if (sunny && !exists) {
        // Ajouter le marker
        markerEntities[t.id] = viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 2),
          billboard: {
            image: makePin(),
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
            width: 36, height: 46,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          },
          properties: { id: t.id }
        });
      } else if (!sunny && exists) {
        // Retirer le marker
        viewer.entities.remove(markerEntities[t.id]);
        delete markerEntities[t.id];
      }
    });
  }

  // ── HELPERS ──
  function normalize(str) { return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

  function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark style="background:var(--sun-bg);color:var(--sun);border-radius:3px;padding:0 2px">$1</mark>');
  }

  function sunPhaseLabel(h) {
    if (h < 10) return "Matinée";
    if (h < 12) return "Mi-matinée";
    if (h < 14) return "Midi";
    if (h < 17) return "Après-midi";
    if (h < 20) return "Fin d'après-midi";
    return "Soirée";
  }

  // ── RENDER LIST ──
  function renderList(h, query) {
    const list = document.getElementById('terrasseList');
    const countEl = document.getElementById('sunCount');
    const q = normalize(query||'');

    let filtered = terrasses;
    if (q) filtered = terrasses.filter(t =>
      normalize(t.nom).includes(q) || normalize(t.type).includes(q) || normalize(t.adresse).includes(q)
    );

    const sorted = [...filtered].sort((a,b) => (sunStates[b.id]?1:0) - (sunStates[a.id]?1:0));
    const sunnyCount = filtered.filter(t => sunStates[t.id]===true).length;

    countEl.textContent = q ? `${sorted.length} résultat${sorted.length>1?'s':''}` : `${sunnyCount} au soleil`;
    list.innerHTML = '';

    if (!sorted.length) {
      list.innerHTML = `<div class="no-results">Aucun résultat pour<br><strong>"${query}"</strong></div>`;
      return;
    }

    sorted.forEach(t => {
      const s = sunStates[t.id] === true;
      const card = document.createElement('div');
      card.className = 'card'; card.dataset.id = t.id;
      card.innerHTML = `
        <div class="card-icon ${s?'sun':'shade'}">${s?'☀️':'🌥'}</div>
        <div class="card-body">
          <div class="card-name">${highlight(t.nom, query)}</div>
          <div class="card-sub">${t.type} · ${t.adresse}</div>
        </div>
        <div class="card-badge ${s?'sun':'shade'}">${s?'Soleil':'Ombre'}</div>
      `;
      card.addEventListener('click', () => {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        if (window.innerWidth <= 640) panel.classList.remove('expanded');
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 220),
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-38), roll: 0 },
          duration: 1.4
        });
      });
      list.appendChild(card);
    });
  }

  // ── SEARCH ──
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  searchInput.addEventListener('input', e => {
    searchQuery = e.target.value;
    searchClear.classList.toggle('visible', searchQuery.length > 0);
    renderList(currentHeure, searchQuery);
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = ''; searchQuery = '';
    searchClear.classList.remove('visible');
    searchInput.focus();
    renderList(currentHeure, '');
  });

  // ── TIME SLIDER ──
  const slider = document.getElementById('timeSlider');
  function updateTime(val) {
    currentHeure = val;
    const h = Math.floor(val), m = Math.round((val-h)*60);
    document.getElementById('heureAffichee').textContent = `${h}h${m<10?'0'+m:m}`;
    document.getElementById('sunPhase').textContent = sunPhaseLabel(val);
    slider.style.setProperty('--pct', ((val-8)/13)*100+'%');
    const date = new Date(); date.setHours(h, m, 0, 0);
    viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
    if (terrasses.length > 0) scheduleShadow();
  }
  slider.addEventListener('input', e => updateTime(parseFloat(e.target.value)));

  // ── CLICK MARKER → highlight card ──
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction(click => {
    const picked = viewer.scene.pick(click.position);
    if (Cesium.defined(picked) && picked.id) {
      const id = picked.id.properties?.id?.getValue();
      if (id) {
        document.querySelectorAll('.card').forEach(c => {
          const match = String(c.dataset.id) === String(id);
          c.classList.toggle('active', match);
          if (match) {
            c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            if (window.innerWidth <= 640) panel.classList.add('expanded');
          }
        });
      }
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

  // ── BOOT ──
  async function init() {
    const now = new Date();
    const initH = Math.min(21, Math.max(8, now.getHours() + Math.round(now.getMinutes()/15)*15/60));
    slider.value = initH; currentHeure = initH;
    const date = new Date(); date.setHours(Math.floor(initH), Math.round((initH%1)*60), 0, 0);
    viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
    slider.style.setProperty('--pct', ((initH-8)/13)*100+'%');
    document.getElementById('heureAffichee').textContent = `${Math.floor(initH)}h${Math.round((initH%1)*60).toString().padStart(2,'0')}`;
    document.getElementById('sunPhase').textContent = sunPhaseLabel(initH);

    let data;
    try { data = await fetchTerrasses(); }
    catch(e) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('terrasseList').style.display = 'block';
      document.getElementById('terrasseList').innerHTML = `<div class="no-results">Erreur de chargement.<br>Vérifiez votre connexion.</div>`;
      return;
    }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('terrasseList').style.display = 'block';

    terrasses = data;
    document.getElementById('footerText').textContent = `${terrasses.length} terrasses · OpenStreetMap`;
    terrasses.forEach(t => { sunStates[t.id] = false; });
    renderList(currentHeure, '');

    // Premier calcul après rendu initial des bâtiments
    viewer.scene.postRender.addEventListener(function firstRender() {
      viewer.scene.postRender.removeEventListener(firstRender);
      runShadow();
    });
  }

  init();
</script>
</body>
</html>
