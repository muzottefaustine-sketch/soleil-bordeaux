<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; }
        #cesiumContainer { width: 100vw; height: 100vh; }
        .panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; padding: 12px 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 10;
            width: 70%; max-width: 300px; font-family: sans-serif;
        }
        input[type=range] { width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="cesiumContainer"></div>

<div class="panel">
    <h3 style="margin: 0 0 5px 0; font-size: 16px;">☀️ <span id="heureAffichee">14h00</span></h3>
    <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25">
</div>

<script>
    // Ta clé Cesium
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: Cesium.createWorldTerrain(),
        skyBox: false, skyAtmosphere: false, baseLayerPicker: false, 
        homeButton: false, infoBox: false, navigationHelpButton: false, 
        sceneModePicker: false, animation: false, timeline: false, 
        fullscreenButton: false, geocoder: false, scene3DOnly: true
    });

    viewer.scene.globe.enableLighting = true;
    viewer.shadows = true;
    viewer.scene.primitives.add(Cesium.createOsmBuildings());

    // --- LISTE DES TERRASSES (Vérifiée) ---
    const places = [
        { name: "L'Avant Comptoir 🍷", lat: 44.8383, lng: -0.5692 },
        { name: "Les Freres Cailloux ☕", lat: 44.8387, lng: -0.5689 }
    ];

    places.forEach(p => {
        viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(p.lng, p.lat, 2),
            point: { pixelSize: 10, color: Cesium.Color.ORANGE, outlineWidth: 2 },
            label: {
                text: p.name,
                font: '12px sans-serif',
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -15),
                disableDepthTestDistance: Number.POSITIVE_INFINITY // Garde le texte visible au-dessus des murs
            }
        });
    });

    // Vue directe Place du Palais
    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(-0.5692, 44.8385, 300),
        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-35), roll: 0 }
    });

    const slider = document.getElementById('timeSlider');
    const affichage = document.getElementById('heureAffichee');

    slider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        const heures = Math.floor(val);
        const minutes = Math.round((val - heures) * 60);
        const minutesStr = minutes < 10 ? '0' + minutes : minutes;
        affichage.innerText = heures + "h" + minutesStr;
        
        const date = new Date();
        date.setHours(heures, minutes, 0, 0);
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
    });

    // Heure actuelle au démarrage
    const maintenant = new Date();
    slider.value = maintenant.getHours() + (Math.round(maintenant.getMinutes() / 15) * 15 / 60);
    slider.dispatchEvent(new Event('input'));
</script>
</body>
</html>
