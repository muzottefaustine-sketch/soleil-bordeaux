<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #cesiumContainer { width: 100vw; height: 100vh; }
        .panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div class="panel">
        <h3 style="margin:0; font-family:sans-serif; color:#ff9800;">☀️ <span id="heureAffichee">14h00</span></h3>
        <input type="range" id="timeSlider" min="8" max="21" step="0.25" style="width:220px;">
    </div>

<script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: Cesium.createWorldTerrain(),
        baseLayerPicker: false, infoBox: false, skyBox: false, skyAtmosphere: false,
        navigationHelpButton: false, sceneModePicker: false, timeline: false, animation: false
    });

    // --- CONFIGURATION DU SOLEIL ---
    viewer.shadows = true;
    viewer.terrainShadows = Cesium.ShadowMode.ENABLED;
    viewer.scene.globe.enableLighting = true;

    // --- ACTIVATION GOOGLE REALISTE AVEC OMBRES ---
    async function setupGoogleTiles() {
        try {
            const tileset = await Cesium.createGooglePhotorealistic3DTileset();
            tileset.shadows = Cesium.ShadowMode.ENABLED; // <--- LA LIGNE MAGIQUE POUR LES OMBRES
            viewer.scene.primitives.add(tileset);
        } catch (error) {
            console.log("Erreur Google Tiles");
        }
    }
    setupGoogleTiles();

    // --- MARQUEURS (Placés sur les terrasses) ---
    const terrasses = [
        { name: "L'Avant Comptoir 🍷", lat: 44.83842, lng: -0.56930 },
        { name: "Les Frères Cailloux ☕", lat: 44.83868, lng: -0.56900 }
    ];

    terrasses.forEach(t => {
        viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 8),
            billboard: {
                image: 'https://img.icons8.com/color/96/marker.png',
                width: 40, height: 40,
                heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                disableDepthTestDistance: Number.POSITIVE_INFINITY 
            },
            label: {
                text: t.name,
                font: 'bold 15px sans-serif',
                fillColor: Cesium.Color.YELLOW,
                outlineColor: Cesium.Color.BLACK,
                outlineWidth: 3,
                pixelOffset: new Cesium.Cartesian2(0, -50),
                disableDepthTestDistance: Number.POSITIVE_INFINITY 
            }
        });
    });

    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(-0.5691, 44.8384, 130),
        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-35), roll: 0 }
    });

    const slider = document.getElementById('timeSlider');
    const affichage = document.getElementById('heureAffichee');

    slider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        const h = Math.floor(val);
        const m = Math.round((val - h) * 60);
        affichage.innerText = h + "h" + (m < 10 ? '0'+m : m);
        
        // Mise à jour de l'heure du monde pour bouger les ombres
        const d = new Date();
        d.setHours(h, m, 0, 0);
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(d);
    });

    const maintenant = new Date();
    slider.value = maintenant.getHours() + (Math.round(maintenant.getMinutes() / 15) * 15 / 60);
    slider.dispatchEvent(new Event('input'));
</script>
</body>
</html>
