<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terrasses · Bordeaux</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sun: #FF9500; --sun-bg: #FFF4E0;
      --shade: #8E9BAD; --shade-bg: #EEF1F5;
      --text: #1C1C1E; --text-2: #6C6C70; --text-3: #AEAEB2;
      --divider: #E5E5EA; --panel-w: 320px;
      --radius-md: 14px; --radius-sm: 10px;
      --white: #FFFFFF; --bg: #F2F2F7;
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: var(--bg); }

    #cesiumContainer {
      position: fixed; left: var(--panel-w); top: 0;
      width: calc(100vw - var(--panel-w)); height: 100vh;
    }
    #panel {
      position: fixed; left: 0; top: 0;
      width: var(--panel-w); height: 100vh;
      background: var(--white); display: flex;
      flex-direction: column; z-index: 10;
      border-right: 1px solid var(--divider);
    }

    /* HEADER */
    .header { padding: 20px 20px 0; flex-shrink: 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .app-name { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
    .app-name span { color: var(--sun); }
    .city-tag { font-size: 11px; font-weight: 500; color: var(--text-2); background: var(--bg); padding: 4px 10px; border-radius: 20px; }

    /* TIME */
    .time-widget { background: var(--bg); border-radius: var(--radius-md); padding: 13px 15px; margin-bottom: 12px; }
    .time-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
    .time-value { font-size: 28px; font-weight: 600; color: var(--text); letter-spacing: -1px; line-height: 1; }
    .time-phase { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--sun); background: var(--sun-bg); padding: 4px 10px; border-radius: 20px; }
    .sun-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sun); }
    .slider-ends { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); font-weight: 500; margin-bottom: 5px; }
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px; border-radius: 2px;
      background: linear-gradient(to right, var(--sun) var(--pct, 46%), var(--divider) var(--pct, 46%));
      outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
      background: var(--white); border: 2.5px solid var(--sun);
      box-shadow: 0 1px 6px rgba(0,0,0,0.12); cursor: pointer; transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 14px; pointer-events: none; }
    #searchInput {
      width: 100%; padding: 9px 34px 9px 32px;
      border-radius: var(--radius-sm); border: 1.5px solid var(--divider);
      background: var(--bg); font-family: 'Outfit', sans-serif;
      font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s;
    }
    #searchInput::placeholder { color: var(--text-3); }
    #searchInput:focus { border-color: var(--sun); background: var(--white); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: var(--text-3); color: white; border: none; border-radius: 50%;
      width: 16px; height: 16px; font-size: 10px; cursor: pointer;
      display: none; align-items: center; justify-content: center; line-height: 1;
    }
    .search-clear.visible { display: flex; }

    /* SECTION */
    .section-title { padding: 2px 20px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .section-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; }
    .count-pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--sun-bg); color: var(--sun); }

    /* LOADING */
    #loadingState { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-3); font-size: 13px; }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--divider); border-top-color: var(--sun); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* LIST */
    .list { flex: 1; overflow-y: auto; padding: 0 12px 20px; scrollbar-width: none; }
    .list::-webkit-scrollbar { display: none; }
    .card { display: flex; align-items: center; gap: 11px; padding: 10px; border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--divider); }
    .card:last-child { border-bottom: none; }
    .card:hover, .card.active { background: var(--bg); border-color: transparent; }
    .card-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .card-icon.sun { background: var(--sun-bg); }
    .card-icon.shade { background: var(--shade-bg); }
    .card-body { flex: 1; min-width: 0; }
    .card-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .card-sub { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-badge { flex-shrink: 0; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
    .card-badge.sun { background: var(--sun-bg); color: var(--sun); }
    .card-badge.shade { background: var(--shade-bg); color: var(--shade); }
    .no-results { padding: 30px 20px; text-align: center; color: var(--text-3); font-size: 13px; line-height: 1.6; }

    /* FOOTER */
    .panel-footer { padding: 11px 20px; border-top: 1px solid var(--divider); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .footer-text { font-size: 10px; color: var(--text-3); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #30D158; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .cesium-widget-credits { display: none !important; }
  </style>
</head>
<body>

<div id="panel">
  <div class="header">
    <div class="header-top">
      <div class="app-name">Terrasses<span>.</span></div>
      <div class="city-tag">Bordeaux</div>
    </div>
    <div class="time-widget">
      <div class="time-row">
        <div class="time-value" id="heureAffichee">14h00</div>
        <div class="time-phase"><div class="sun-dot"></div><span id="sunPhase">Après-midi</span></div>
      </div>
      <div class="slider-ends"><span>8h</span><span>21h</span></div>
      <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25">
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher un bar, resto…">
      <button class="search-clear" id="searchClear">✕</button>
    </div>
  </div>

  <div class="section-title">
    <span class="section-label">Terrasses</span>
    <span class="count-pill" id="sunCount">…</span>
  </div>

  <div id="loadingState">
    <div class="spinner"></div>
    <span>Chargement des terrasses…</span>
  </div>

  <div class="list" id="terrasseList" style="display:none;"></div>

  <div class="panel-footer">
    <div class="live-dot"></div>
    <span class="footer-text" id="footerText">Ombres 3D · OpenStreetMap</span>
  </div>
</div>

<div id="cesiumContainer"></div>

<script>
  // ── CESIUM ──
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

  const viewer = new Cesium.Viewer('cesiumContainer', {
    terrainProvider: Cesium.createWorldTerrain(),
    skyBox: false, skyAtmosphere: false, baseLayerPicker: false,
    homeButton: false, infoBox: false, navigationHelpButton: false,
    sceneModePicker: false, animation: false, timeline: false,
    fullscreenButton: false, geocoder: false, scene3DOnly: true
  });

  viewer.scene.screenSpaceCameraController.enableZoom = true;
  viewer.scene.screenSpaceCameraController.enableRotate = true;
  viewer.scene.screenSpaceCameraController.enableTilt = true;
  viewer.scene.screenSpaceCameraController.enableTranslate = true;
  viewer.scene.globe.enableLighting = true;
  viewer.shadows = true;
  viewer.scene.primitives.add(Cesium.createOsmBuildings());

  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(-0.5792, 44.845, 900),
    orientation: { heading: Cesium.Math.toRadians(0), pitch: Cesium.Math.toRadians(-45), roll: 0 }
  });

  // ── STATE ──
  let terrasses = [];
  let searchQuery = '';
  let currentHeure = 14;
  const markerEntities = {};

  // ── OVERPASS ──
  // Bordeaux centre + Chartrons (rive gauche nord) + Bacalan
  const BBOX = '44.820,-0.600,44.875,-0.535';

  const QUERY = `[out:json][timeout:30];
(
  node["amenity"="bar"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="cafe"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="restaurant"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="pub"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="biergarten"](${BBOX});
  node["amenity"="bar"](${BBOX});
  node["amenity"="cafe"](${BBOX});
);
out body;`;

  function typeLabel(a) {
    return { bar:'Bar', cafe:'Café', restaurant:'Restaurant', pub:'Pub', biergarten:'Brasserie' }[a] || 'Terrasse';
  }

  // Simple sun heuristic based on longitude (orientation est/ouest dans Bordeaux)
  // Will be replaced by proper ray casting later
  function sunWindow(lng) {
    // Rues orientées N-S : soleil matin + soir. E-O : midi.
    // Rive gauche centre : ~10h-18h en moyenne
    const base = 9 + (lng + 0.58) * 10; // slight variation by position
    return { sunStart: Math.round(Math.max(8, Math.min(11, base))), sunEnd: Math.round(Math.min(21, Math.max(16, base + 8))) };
  }

  async function fetchTerrasses() {
    try {
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: 'data=' + encodeURIComponent(QUERY)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      return data.elements
        .filter(el => el.lat && el.lon && el.tags && el.tags.name)
        .map(el => {
          const { sunStart, sunEnd } = sunWindow(el.lon);
          return {
            id: el.id,
            nom: el.tags.name,
            adresse: el.tags['addr:street']
              ? ((el.tags['addr:housenumber'] || '') + ' ' + el.tags['addr:street']).trim()
              : 'Bordeaux',
            type: typeLabel(el.tags.amenity),
            lng: el.lon,
            lat: el.lat,
            sunStart, sunEnd
          };
        });
    } catch (e) {
      console.error('Overpass error:', e);
      return null;
    }
  }

  // ── MARKERS ──
  function makePin(sunny) {
    const c = document.createElement('canvas');
    c.width = 44; c.height = 56;
    const ctx = c.getContext('2d');
    const cx = 22, r = 16;
    ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
    ctx.beginPath(); ctx.arc(cx, r + 2, r, 0, Math.PI * 2);
    ctx.fillStyle = sunny ? '#FF9500' : '#8E9BAD'; ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.beginPath(); ctx.moveTo(cx - 6, r + 14); ctx.lineTo(cx + 6, r + 14); ctx.lineTo(cx, 54);
    ctx.closePath(); ctx.fillStyle = sunny ? '#FF9500' : '#8E9BAD'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, r + 2, r - 5, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill();
    ctx.font = '13px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(sunny ? '☀️' : '🌥', cx, r + 2);
    return c.toDataURL();
  }

  function addOrUpdateMarker(t, sunny) {
    if (markerEntities[t.id]) {
      markerEntities[t.id].billboard.image = makePin(sunny);
      return;
    }
    const entity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 2),
      billboard: {
        image: makePin(sunny),
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        width: 44, height: 56,
        disableDepthTestDistance: Number.POSITIVE_INFINITY
      },
      properties: { id: t.id }
    });
    markerEntities[t.id] = entity;
  }

  function updateMarkers(h) {
    terrasses.forEach(t => {
      const e = markerEntities[t.id];
      if (e) e.billboard.image = makePin(isSunny(t, h));
    });
  }

  // ── HELPERS ──
  function isSunny(t, h) { return h >= t.sunStart && h < t.sunEnd; }

  function sunPhaseLabel(h) {
    if (h < 10) return "Matinée";
    if (h < 12) return "Mi-matinée";
    if (h < 14) return "Midi";
    if (h < 17) return "Après-midi";
    if (h < 20) return "Fin d'après-midi";
    return "Soirée";
  }

  function normalize(str) {
    return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(re, '<mark style="background:var(--sun-bg);color:var(--sun);border-radius:3px;padding:0 2px">$1</mark>');
  }

  // ── RENDER ──
  function renderList(h, query) {
    const list = document.getElementById('terrasseList');
    const countEl = document.getElementById('sunCount');
    const q = normalize(query || '');

    let filtered = terrasses;
    if (q) {
      filtered = terrasses.filter(t =>
        normalize(t.nom).includes(q) ||
        normalize(t.type).includes(q) ||
        normalize(t.adresse).includes(q)
      );
    }

    const sorted = [...filtered].sort((a, b) => isSunny(b, h) - isSunny(a, h));
    const sunnyCount = filtered.filter(t => isSunny(t, h)).length;

    list.innerHTML = '';

    if (sorted.length === 0) {
      list.innerHTML = `<div class="no-results">Aucun résultat pour<br><strong>"${query}"</strong></div>`;
      countEl.textContent = '0 résultat';
      return;
    }

    countEl.textContent = q
      ? `${sorted.length} résultat${sorted.length > 1 ? 's' : ''}`
      : `${sunnyCount} au soleil`;

    sorted.forEach(t => {
      const s = isSunny(t, h);
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = t.id;
      card.innerHTML = `
        <div class="card-icon ${s ? 'sun' : 'shade'}">${s ? '☀️' : '🌥'}</div>
        <div class="card-body">
          <div class="card-name">${highlight(t.nom, query)}</div>
          <div class="card-sub">${t.type} · ${t.adresse}</div>
        </div>
        <div class="card-badge ${s ? 'sun' : 'shade'}">${s ? 'Soleil' : 'Ombre'}</div>
      `;
      card.addEventListener('click', () => {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 220),
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-38), roll: 0 },
          duration: 1.4
        });
      });
      list.appendChild(card);
    });
  }

  // ── SEARCH ──
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');

  searchInput.addEventListener('input', e => {
    searchQuery = e.target.value;
    searchClear.classList.toggle('visible', searchQuery.length > 0);
    renderList(currentHeure, searchQuery);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    searchClear.classList.remove('visible');
    searchInput.focus();
    renderList(currentHeure, '');
  });

  // ── TIME ──
  const slider = document.getElementById('timeSlider');

  function updateTime(val) {
    currentHeure = val;
    const h = Math.floor(val);
    const m = Math.round((val - h) * 60);
    const ms = m < 10 ? '0' + m : m;
    document.getElementById('heureAffichee').textContent = `${h}h${ms}`;
    document.getElementById('sunPhase').textContent = sunPhaseLabel(val);
    slider.style.setProperty('--pct', ((val - 8) / 13) * 100 + '%');

    // Aujourd'hui, heure choisie
    const date = new Date();
    date.setHours(h, m, 0, 0);
    viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);

    if (terrasses.length > 0) {
      updateMarkers(val);
      renderList(val, searchQuery);
    }
  }

  slider.addEventListener('input', e => updateTime(parseFloat(e.target.value)));

  // ── CLICK MARKER ──
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction(click => {
    const picked = viewer.scene.pick(click.position);
    if (Cesium.defined(picked) && picked.id) {
      const id = picked.id.properties?.id?.getValue();
      if (id) {
        document.querySelectorAll('.card').forEach(c => {
          const match = String(c.dataset.id) === String(id);
          c.classList.toggle('active', match);
          if (match) c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
      }
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

  // ── BOOT ──
  async function init() {
    const now = new Date();
    const initH = Math.min(21, Math.max(8, now.getHours() + Math.round(now.getMinutes() / 15) * 15 / 60));
    slider.value = initH;
    updateTime(initH);

    const data = await fetchTerrasses();

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('terrasseList').style.display = 'block';

    if (!data || data.length === 0) {
      document.getElementById('terrasseList').innerHTML =
        `<div class="no-results">Impossible de charger les données.<br>Vérifiez votre connexion internet.</div>`;
      document.getElementById('sunCount').textContent = '—';
      return;
    }

    terrasses = data;
    terrasses.forEach(t => addOrUpdateMarker(t, isSunny(t, currentHeure)));
    document.getElementById('footerText').textContent = `${terrasses.length} terrasses · OpenStreetMap`;
    renderList(currentHeure, '');
  }

  init();
</script>
</body>
</html>
