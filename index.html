<!DOCTYPE html>
<html>
<head>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    #cesiumContainer { width: 100vw; height: 100vh; }
    .panel {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: white; padding: 12px 20px; border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 10; font-family: sans-serif;
    }
    /* STYLE DES ÉTIQUETTES IMMOBILES */
    .label-fixe {
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #000;
      font-family: sans-serif;
      font-size: 12px;
      font-weight: bold;
      pointer-events: none; /* Ne gêne pas le clic sur la carte */
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div class="panel">
    <div style="font-weight: bold; margin-bottom: 5px;">☀️ <span id="heureAffichee">14h00</span></div>
    <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25" style="width:200px;">
  </div>

<script>
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';
  
  const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.createWorldTerrain(),
      baseLayerPicker: false, infoBox: false, skyBox: false, skyAtmosphere: false,
      navigationHelpButton: false, sceneModePicker: false, timeline: false, animation: false,
      geocoder: false, selectionIndicator: false, homeButton: false
  });

  viewer.scene.globe.enableLighting = true;
  viewer.shadows = true;
  viewer.scene.primitives.add(Cesium.createOsmBuildings());

  // --- LES RESTOS ---
  const restos = [
    { name: "L'Avant Comptoir", lat: 44.83842, lng: -0.56930, id: 'label1' },
    { name: "Les Frères Cailloux", lat: 44.83872, lng: -0.56905, id: 'label2' }
  ];

  restos.forEach(r => {
    // 1. On crée le point rouge dans la 3D
    r.entity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(r.lng, r.lat),
      point: { pixelSize: 10, color: Cesium.Color.RED, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 }
    });

    // 2. On crée l'élément HTML pour le nom
    const el = document.createElement('div');
    el.className = 'label-fixe';
    el.id = r.id;
    el.innerHTML = r.name;
    document.body.appendChild(el);
    r.element = el;
  });

  // --- BOUCLE DE MISE À JOUR (L'aimant) ---
  viewer.scene.postRender.addEventListener(function() {
    restos.forEach(r => {
      const canvasPosition = viewer.scene.cartesianToCanvasCoordinates(r.entity.position.getValue(viewer.clock.currentTime));
      if (Cesium.defined(canvasPosition)) {
        r.element.style.display = "block";
        r.element.style.left = canvasPosition.x - (r.element.offsetWidth / 2) + "px";
        r.element.style.top = canvasPosition.y - 30 + "px"; // 30px au dessus du point
      } else {
        r.element.style.display = "none";
      }
    });
  });

  viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(-0.5692, 44.8385, 120),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-35), roll: 0 }
  });

  const slider = document.getElementById('timeSlider');
  slider.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      const h = Math.floor(val);
      const m = Math.round((val - h) * 60);
      document.getElementById('heureAffichee').innerText = h + "h" + (m < 10 ? '0' + m : m);
      const d = new Date(); d.setHours(h, m, 0, 0);
      viewer.clock.currentTime = Cesium.JulianDate.fromDate(d);
  });
</script>
</body>
</html>
