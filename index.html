<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; }
        #cesiumContainer { width: 100vw; height: 100vh; }
        .panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div class="panel">
        <h3 style="margin:0; font-family:sans-serif; color:#ff9800;">☀️ <span id="heureAffichee">14h00</span></h3>
        <input type="range" id="timeSlider" min="8" max="21" step="0.25" style="width:200px; cursor:pointer;">
    </div>

<script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: Cesium.createWorldTerrain(),
        baseLayerPicker: false, infoBox: false, skyBox: false, skyAtmosphere: false,
        navigationHelpButton: false, sceneModePicker: false, timeline: false, animation: false
    });

    viewer.scene.globe.enableLighting = true;
    viewer.shadows = true;
    viewer.scene.primitives.add(Cesium.createOsmBuildings());

    // --- MARQUEURS STYLE "SOLEIL" ---
    const terrasses = [
        { name: "L'Avant Comptoir 🍷", lat: 44.83835, lng: -0.56915 },
        { name: "Les Frères Cailloux ☕", lat: 44.83865, lng: -0.56885 }
    ];

    terrasses.forEach(t => {
        viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 1),
            // On crée un petit panneau vertical pour que ça se voie de loin
            billboard: {
                image: 'https://img.icons8.com/emoji/48/000000/sun-emoji.png', 
                width: 32, height: 32,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND
            },
            label: {
                text: t.name,
                font: 'bold 14px sans-serif',
                fillColor: Cesium.Color.BLACK,
                outlineColor: Cesium.Color.WHITE,
                outlineWidth: 3,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                pixelOffset: new Cesium.Cartesian2(0, -40),
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM
            }
        });
    });

    // --- VUE ZOOMÉE ET BIEN PLACÉE ---
    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(-0.5691, 44.8384, 120), // Zoom à 120m du sol
        orientation: {
            heading: Cesium.Math.toRadians(15), // Légère rotation vers la droite
            pitch: Cesium.Math.toRadians(-30),  // Angle parfait pour voir les ombres portées au sol
            roll: 0
        }
    });

    const slider = document.getElementById('timeSlider');
    const affichage = document.getElementById('heureAffichee');

    slider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        const h = Math.floor(val);
        const m = Math.round((val - h) * 60);
        affichage.innerText = h + "h" + (m < 10 ? '0'+m : m);
        const d = new Date(); d.setHours(h, m, 0, 0);
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(d);
    });

    const maintenant = new Date();
    slider.value = maintenant.getHours() + (Math.round(maintenant.getMinutes() / 15) * 15 / 60);
    slider.dispatchEvent(new Event('input'));
</script>
</body>
</html>
