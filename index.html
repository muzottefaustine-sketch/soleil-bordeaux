<!DOCTYPE html>
<html>
<head>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    #cesiumContainer { width: 100vw; height: 100vh; }
    .panel {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: white; padding: 10px; border-radius: 10px;
      text-align: center; z-index: 10; font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div class="panel">
    <div style="font-weight: bold;">☀️ <span id="heureAffichee">14h00</span></div>
    <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.5" style="width:180px;">
  </div>

<script>
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';
  
  const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.createWorldTerrain(),
      infoBox: false, selectionIndicator: false, navigationHelpButton: false, 
      baseLayerPicker: false, geocoder: false, homeButton: false, sceneModePicker: false, 
      timeline: false, animation: false
  });

  viewer.scene.globe.enableLighting = true;
  viewer.shadows = true;
  viewer.scene.primitives.add(Cesium.createOsmBuildings());

  function ajouter(nom, lat, lng) {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lng, lat),
      point: { pixelSize: 10, color: Cesium.Color.RED, heightReference: Cesium.HeightReference.CLAMP_TO_GROUND },
      label: {
        text: nom,
        font: '14px sans-serif',
        fillColor: Cesium.Color.WHITE,
        outlineColor: Cesium.Color.BLACK,
        outlineWidth: 3,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        pixelOffset: new Cesium.Cartesian2(0, -15),
        disableDepthTestDistance: Number.POSITIVE_INFINITY // Garde le texte visible
      }
    });
  }

  // Tes points (Simplifiés au maximum)
  ajouter("L'Avant Comptoir", 44.83842, -0.56930);
  ajouter("Les Frères Cailloux", 44.83872, -0.56905);

  viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(-0.5692, 44.8385, 120),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-35), roll: 0 }
  });

  const slider = document.getElementById('timeSlider');
  slider.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      const h = Math.floor(val);
      const m = Math.round((val - h) * 60);
      document.getElementById('heureAffichee').innerText = h + "h" + (m < 10 ? '0' + m : m);
      viewer.clock.currentTime = Cesium.JulianDate.fromDate(new Date(2026, 2, 6, h, m));
  });
</script>
</body>
</html>
