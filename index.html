<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terrasses · Bordeaux</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sun: #FF9500;
      --sun-bg: #FFF4E0;
      --shade: #8E9BAD;
      --shade-bg: #EEF1F5;
      --text: #1C1C1E;
      --text-2: #6C6C70;
      --text-3: #AEAEB2;
      --divider: #E5E5EA;
      --panel-w: 320px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --white: #FFFFFF;
      --bg: #F2F2F7;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: var(--bg); }

    #cesiumContainer {
      position: fixed;
      left: var(--panel-w);
      top: 0;
      width: calc(100vw - var(--panel-w));
      height: 100vh;
    }

    #panel {
      position: fixed;
      left: 0; top: 0;
      width: var(--panel-w);
      height: 100vh;
      background: var(--white);
      display: flex;
      flex-direction: column;
      z-index: 10;
      border-right: 1px solid var(--divider);
    }

    /* HEADER */
    .header { padding: 20px 20px 0; }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .app-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .app-name span { color: var(--sun); }

    .city-tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* TIME WIDGET */
    .time-widget {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .time-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .time-value {
      font-size: 30px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
    }

    .time-sun-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--sun);
      background: var(--sun-bg);
      padding: 5px 10px;
      border-radius: 20px;
    }

    .sun-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--sun);
    }

    .slider-ends {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-3);
      font-weight: 500;
      margin-bottom: 6px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--sun) var(--pct, 46%), var(--divider) var(--pct, 46%));
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--white);
      border: 2.5px solid var(--sun);
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      cursor: pointer;
      transition: transform 0.1s;
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

    /* SECTION */
    .section-title {
      padding: 4px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .count-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--sun-bg);
      color: var(--sun);
    }

    /* LIST */
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 20px;
      scrollbar-width: none;
    }
    .list::-webkit-scrollbar { display: none; }

    .card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 10px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--divider);
    }

    .card:last-child { border-bottom: none; }
    .card:hover, .card.active { background: var(--bg); border-color: transparent; }

    .card-icon {
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .card-icon.sun { background: var(--sun-bg); }
    .card-icon.shade { background: var(--shade-bg); }

    .card-body { flex: 1; min-width: 0; }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .card-sub {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .card-badge.sun { background: var(--sun-bg); color: var(--sun); }
    .card-badge.shade { background: var(--shade-bg); color: var(--shade); }

    /* FOOTER */
    .panel-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-text { font-size: 10px; color: var(--text-3); }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #30D158;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .cesium-widget-credits { display: none !important; }
  </style>
</head>
<body>

<div id="panel">
  <div class="header">
    <div class="header-top">
      <div class="app-name">Terrasses<span>.</span></div>
      <div class="city-tag">Bordeaux</div>
    </div>

    <div class="time-widget">
      <div class="time-row">
        <div class="time-value" id="heureAffichee">14h00</div>
        <div class="time-sun-indicator">
          <div class="sun-dot"></div>
          <span id="sunPhase">Après-midi</span>
        </div>
      </div>
      <div class="slider-ends"><span>8h</span><span>21h</span></div>
      <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25">
    </div>
  </div>

  <div class="section-title">
    <span class="section-label">Terrasses</span>
    <span class="count-pill" id="sunCount">…</span>
  </div>

  <div class="list" id="terrasseList"></div>

  <div class="panel-footer">
    <div class="live-dot"></div>
    <span class="footer-text">Ombres 3D simulées · données indicatives</span>
  </div>
</div>

<div id="cesiumContainer"></div>

<script>
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

  const viewer = new Cesium.Viewer('cesiumContainer', {
    terrainProvider: Cesium.createWorldTerrain(),
    skyBox: false, skyAtmosphere: false,
    baseLayerPicker: false, homeButton: false,
    infoBox: false, navigationHelpButton: false,
    sceneModePicker: false, animation: false,
    timeline: false, fullscreenButton: false,
    geocoder: false, scene3DOnly: true
  });

  viewer.scene.screenSpaceCameraController.enableZoom = true;
  viewer.scene.screenSpaceCameraController.enableRotate = true;
  viewer.scene.screenSpaceCameraController.enableTilt = true;
  viewer.scene.screenSpaceCameraController.enableTranslate = true;
  viewer.scene.globe.enableLighting = true;
  viewer.shadows = true;
  viewer.scene.primitives.add(Cesium.createOsmBuildings());

  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(-0.5792, 44.8378, 500),
    orientation: {
      heading: Cesium.Math.toRadians(0),
      pitch: Cesium.Math.toRadians(-45),
      roll: 0.0
    }
  });

  // DATA
  const terrasses = [
    { id:1, nom:"Le Pressoir d'Argent", adresse:"Pl. de la Comédie",      lng:-0.5751, lat:44.8414, sunStart:10, sunEnd:17, type:"Brasserie" },
    { id:2, nom:"Café du Marché",        adresse:"Marché des Capucins",    lng:-0.5701, lat:44.8348, sunStart:11, sunEnd:19, type:"Bistrot" },
    { id:3, nom:"Darwin Éco-Système",    adresse:"Quai des Queyries",      lng:-0.5553, lat:44.8378, sunStart:9,  sunEnd:20, type:"Espace urbain" },
    { id:4, nom:"Bar à Vin CIVB",        adresse:"Cours du 30 Juillet",    lng:-0.5762, lat:44.8408, sunStart:12, sunEnd:16, type:"Cave" },
    { id:5, nom:"Jardin Public",         adresse:"Cours de Verdun",        lng:-0.5819, lat:44.8484, sunStart:8,  sunEnd:20, type:"Kiosque" },
    { id:6, nom:"Quai des Marques",      adresse:"Quai de Bacalan",        lng:-0.5503, lat:44.8630, sunStart:10, sunEnd:21, type:"Fluviale" },
    { id:7, nom:"Boulangerie Utopie",    adresse:"Rue Notre-Dame",         lng:-0.5671, lat:44.8434, sunStart:9,  sunEnd:15, type:"Café" },
    { id:8, nom:"Le Chien de Pavlov",    adresse:"Rue du Pas St-Georges",  lng:-0.5750, lat:44.8380, sunStart:13, sunEnd:20, type:"Bar" },
  ];

  function isSunny(t, h) { return h >= t.sunStart && h < t.sunEnd; }

  function sunPhaseLabel(h) {
    if (h < 10) return "Matinée";
    if (h < 12) return "Mi-matinée";
    if (h < 14) return "Midi";
    if (h < 17) return "Après-midi";
    if (h < 20) return "Fin d'après-midi";
    return "Soirée";
  }

  // MARKERS
  const markerEntities = {};

  function makePin(sunny) {
    const c = document.createElement('canvas');
    c.width = 44; c.height = 56;
    const ctx = c.getContext('2d');
    const cx = 22, r = 16;

    ctx.shadowColor = 'rgba(0,0,0,0.25)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 3;

    ctx.beginPath();
    ctx.arc(cx, r + 2, r, 0, Math.PI * 2);
    ctx.fillStyle = sunny ? '#FF9500' : '#8E9BAD';
    ctx.fill();

    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.beginPath();
    ctx.moveTo(cx - 6, r + 14);
    ctx.lineTo(cx + 6, r + 14);
    ctx.lineTo(cx, 54);
    ctx.closePath();
    ctx.fillStyle = sunny ? '#FF9500' : '#8E9BAD';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx, r + 2, r - 5, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();

    ctx.font = '13px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sunny ? '☀️' : '🌥', cx, r + 2);

    return c.toDataURL();
  }

  terrasses.forEach(t => {
    const entity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 2),
      billboard: {
        image: makePin(true),
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        width: 44, height: 56,
        disableDepthTestDistance: Number.POSITIVE_INFINITY
      },
      properties: { id: t.id }
    });
    markerEntities[t.id] = entity;
  });

  function updateMarkers(h) {
    terrasses.forEach(t => {
      const e = markerEntities[t.id];
      if (e) e.billboard.image = makePin(isSunny(t, h));
    });
  }

  // LIST
  function renderList(h) {
    const list = document.getElementById('terrasseList');
    const countEl = document.getElementById('sunCount');
    let sunnyCount = 0;

    const sorted = [...terrasses].sort((a, b) => isSunny(b, h) - isSunny(a, h));
    list.innerHTML = '';

    sorted.forEach(t => {
      const s = isSunny(t, h);
      if (s) sunnyCount++;

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = t.id;
      card.innerHTML = `
        <div class="card-icon ${s ? 'sun' : 'shade'}">${s ? '☀️' : '🌥'}</div>
        <div class="card-body">
          <div class="card-name">${t.nom}</div>
          <div class="card-sub">${t.type} · ${t.adresse}</div>
        </div>
        <div class="card-badge ${s ? 'sun' : 'shade'}">${s ? 'Soleil' : 'Ombre'}</div>
      `;

      card.addEventListener('click', () => {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 220),
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-38), roll: 0 },
          duration: 1.4
        });
      });

      list.appendChild(card);
    });

    countEl.textContent = `${sunnyCount} au soleil`;
  }

  // SLIDER
  const slider = document.getElementById('timeSlider');

  function updateTime(val) {
    const h = Math.floor(val);
    const m = Math.round((val - h) * 60);
    const ms = m < 10 ? '0' + m : m;
    document.getElementById('heureAffichee').textContent = `${h}h${ms}`;
    document.getElementById('sunPhase').textContent = sunPhaseLabel(val);

    const pct = ((val - 8) / 13) * 100;
    slider.style.setProperty('--pct', pct + '%');

    const date = new Date('2024-06-15');
    date.setHours(h, m, 0, 0);
    viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);

    updateMarkers(val);
    renderList(val);
  }

  slider.addEventListener('input', e => updateTime(parseFloat(e.target.value)));

  const now = new Date();
  const init = Math.min(21, Math.max(8, now.getHours() + Math.round(now.getMinutes() / 15) * 15 / 60));
  slider.value = init;
  updateTime(init);

  // CLICK marker → highlight card
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction(click => {
    const picked = viewer.scene.pick(click.position);
    if (Cesium.defined(picked) && picked.id) {
      const id = picked.id.properties?.id?.getValue();
      if (id) {
        document.querySelectorAll('.card').forEach(c => {
          c.classList.toggle('active', parseInt(c.dataset.id) === id);
          if (parseInt(c.dataset.id) === id) c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
      }
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
</script>
</body>
</html>
