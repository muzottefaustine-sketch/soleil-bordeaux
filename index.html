<script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
  body { margin: 0; padding: 0; overflow: hidden; background-color: #f8f9fa; }
  #cesiumContainer { width: 100vw; height: 100vh; }
  .panel {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
    padding: 12px 20px; border-radius: 30px; border: 1px solid rgba(0,0,0,0.1);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center; z-index: 10;
    width: 250px; font-family: 'Segoe UI', Roboto, sans-serif;
  }
  input[type=range] { width: 100%; margin-top: 8px; accent-color: #ff9800; cursor: pointer; }
</style>

<div id="cesiumContainer"></div>
<div class="panel">
  <div style="font-weight: 600; color: #333; margin-bottom: 4px;">🕒 <span id="heureAffichee">14h00</span></div>
  <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25">
</div>

<script>
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

  const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.createWorldTerrain(),
      skyBox: false, skyAtmosphere: false, baseLayerPicker: false, 
      homeButton: false, infoBox: false, navigationHelpButton: false, 
      sceneModePicker: false, animation: false, timeline: false, 
      fullscreenButton: false, geocoder: false, scene3DOnly: true
  });

  viewer.scene.globe.enableLighting = true;
  viewer.shadows = true;
  viewer.scene.primitives.add(Cesium.createOsmBuildings());

  // --- FONCTION POUR CRÉER UN MARQUEUR DESIGN ---
  function créerMarqueur(nom, lat, lng, emoji) {
    const position = Cesium.Cartesian3.fromDegrees(lng, lat, 0);
    const positionFlottante = Cesium.Cartesian3.fromDegrees(lng, lat, 12);

    // La ligne verticale (le pied)
    viewer.entities.add({
      polyline: {
        positions: [position, positionFlottante],
        width: 2,
        material: new Cesium.PolylineDashMaterialProperty({ color: Cesium.Color.fromCssColorString('#ff9800') })
      }
    });

    // L'icône et le texte
    viewer.entities.add({
      position: positionFlottante,
      label: {
        text: emoji + '\n' + nom,
        font: 'bold 13px sans-serif',
        fillColor: Cesium.Color.BLACK,
        outlineColor: Cesium.Color.WHITE,
        outlineWidth: 4,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        disableDepthTestDistance: Number.POSITIVE_INFINITY
      }
    });
  }

  // --- PLACEMENT PRÉCIS ---
  créerMarqueur("L'Avant Comptoir", 44.83842, -0.56935, "🍷");
  créerMarqueur("Les Frères Cailloux", 44.83872, -0.56905, "☀️");

  viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(-0.5692, 44.8384, 120),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-30), roll: 0 }
  });

  const slider = document.getElementById('timeSlider');
  const affichage = document.getElementById('heureAffichee');

  slider.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      const h = Math.floor(val);
      const m = Math.round((val - h) * 60);
      affichage.innerText = h + "h" + (m < 10 ? '0' + m : m);
      const d = new Date(); d.setHours(h, m, 0, 0);
      viewer.clock.currentTime = Cesium.JulianDate.fromDate(d);
  });

  const maintenant = new Date();
  slider.value = maintenant.getHours() + (Math.round(maintenant.getMinutes() / 15) * 15 / 60);
  slider.dispatchEvent(new Event('input'));
</script>
