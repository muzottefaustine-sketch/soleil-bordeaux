<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Terrasses · Bordeaux</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sun: #FF9500; --sun-bg: #FFF4E0;
      --shade: #8E9BAD; --shade-bg: #EEF1F5;
      --text: #1C1C1E; --text-2: #6C6C70; --text-3: #AEAEB2;
      --divider: #E5E5EA; --panel-w: 320px;
      --radius-md: 14px; --radius-sm: 10px;
      --white: #FFFFFF; --bg: #F2F2F7;
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: #000; }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #splash.fade-out { opacity: 0; transform: scale(1.03); pointer-events: none; }

    .splash-sun {
      font-size: 64px;
      animation: splash-pulse 2s ease-in-out infinite;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 24px rgba(255,149,0,0.5));
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 20px rgba(255,149,0,0.4)); }
      50%       { transform: scale(1.08); filter: drop-shadow(0 0 36px rgba(255,149,0,0.7)); }
    }

    .splash-title {
      font-size: 32px; font-weight: 600;
      color: white; letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .splash-title span { color: var(--sun); }

    .splash-sub {
      font-size: 14px; color: rgba(255,255,255,0.45);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 48px;
    }

    .splash-loader {
      display: flex; gap: 7px; align-items: center;
    }
    .splash-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--sun); opacity: 0.3;
      animation: splash-bounce 1.2s ease-in-out infinite;
    }
    .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes splash-bounce {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50%       { opacity: 1;   transform: translateY(-6px); }
    }

    .splash-status {
      margin-top: 18px;
      font-size: 12px; color: rgba(255,255,255,0.3);
      letter-spacing: 0.3px;
    }

    /* ── MAP ── */
    #cesiumContainer { position: fixed; inset: 0; width: 100vw; height: 100vh; }

    /* Supprimer TOUS les curseurs/sélections verts de Cesium */
    .cesium-widget canvas { outline: none !important; }
    .cesium-selection-wrapper { display: none !important; }
    .cesium-infoBox { display: none !important; }

    /* ── CURSEUR FLOTTANT ── */
    .panel-map {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: white; padding: 14px 22px; border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center;
      z-index: 30; width: 80%; max-width: 400px;
    }
    .panel-map h3 {
      margin: 0 0 10px 0; font-size: 16px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .panel-map input[type=range] {
      width: 100%; margin-top: 4px; cursor: pointer;
      -webkit-appearance: none; height: 3px; border-radius: 2px;
      background: linear-gradient(to right, var(--sun) var(--pct,46%), #E5E5EA var(--pct,46%));
      outline: none;
    }
    .panel-map input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: white; border: 2.5px solid var(--sun);
      box-shadow: 0 1px 8px rgba(0,0,0,0.15); cursor: pointer;
    }
    .panel-map input[type=range]:focus { outline: none; }
    .panel-map input[type=range]:focus::-webkit-slider-thumb { outline: none; }

    /* ── TOOLTIP ── */
    #tooltip {
      position: fixed; z-index: 50;
      background: rgba(10,10,15,0.88); color: white;
      padding: 8px 13px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      pointer-events: none;
      opacity: 0; transform: translateY(4px);
      transition: opacity 0.15s, transform 0.15s;
      backdrop-filter: blur(8px);
      max-width: 220px; text-align: center;
    }
    #tooltip.visible { opacity: 1; transform: translateY(0); }
    #tooltip .tt-type { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    #tooltip .tt-sun  { font-size: 11px; margin-top: 3px; }
    #tooltip .tt-sun.sun   { color: var(--sun); }
    #tooltip .tt-sun.shade { color: #93b4d4; }

    /* ── BOUTON LISTE ── */
    #btnListe {
      position: fixed; top: 20px; right: 20px; z-index: 30;
      background: white; border: none; border-radius: 14px;
      padding: 10px 16px; font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--text);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15); cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    #btnListe:active { background: var(--bg); }

    /* ── DRAWER ── */
    #drawer {
      position: fixed; z-index: 40; background: var(--white);
      display: flex; flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    @media (min-width: 641px) {
      #drawer { top:0; right:0; width:var(--panel-w); height:100vh; border-left:1px solid var(--divider); transform:translateX(110%); }
      #drawer.open { transform:translateX(0); }
    }
    @media (max-width: 640px) {
      #drawer { left:0; bottom:0; width:100%; height:78vh; border-radius:18px 18px 0 0; border-top:1px solid var(--divider); box-shadow:0 -4px 24px rgba(0,0,0,0.12); transform:translateY(110%); }
      #drawer.open { transform:translateY(0); }
    }

    .drawer-handle { display:none; justify-content:center; padding:10px 0 4px; flex-shrink:0; cursor:pointer; }
    .drawer-bar { width:36px; height:4px; background:var(--divider); border-radius:2px; }
    @media (max-width:640px) { .drawer-handle { display:flex; } }

    .drawer-header { padding:16px 20px 0; flex-shrink:0; }
    .drawer-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .drawer-title { font-size:17px; font-weight:600; color:var(--text); }
    .drawer-title span { color:var(--sun); }
    #btnClose {
      background:var(--bg); border:none; border-radius:50%;
      width:30px; height:30px; font-size:14px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; color:var(--text-2);
    }

    .search-wrap { position:relative; margin-bottom:10px; }
    .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-3); font-size:13px; pointer-events:none; }
    #searchInput {
      width:100%; padding:8px 30px 8px 30px; border-radius:var(--radius-sm);
      border:1.5px solid var(--divider); background:var(--bg);
      font-family:'Outfit',sans-serif; font-size:13px; color:var(--text);
      outline:none; transition:border-color 0.15s;
    }
    #searchInput::placeholder { color:var(--text-3); }
    #searchInput:focus { border-color:var(--sun); background:white; }
    .search-clear {
      position:absolute; right:9px; top:50%; transform:translateY(-50%);
      background:var(--text-3); color:white; border:none; border-radius:50%;
      width:16px; height:16px; font-size:10px; cursor:pointer;
      display:none; align-items:center; justify-content:center;
    }
    .search-clear.visible { display:flex; }

    .section-title { padding:4px 20px 8px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .section-label { font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:0.8px; }
    .count-pill { font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; background:var(--sun-bg); color:var(--sun); }

    #loadingState { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text-3); font-size:13px; }
    .spinner { width:24px; height:24px; border:2.5px solid var(--divider); border-top-color:var(--sun); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .list { flex:1; overflow-y:auto; padding:0 12px 24px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .list::-webkit-scrollbar { display:none; }
    .card { display:flex; align-items:center; gap:10px; padding:10px 8px; border-radius:var(--radius-md); cursor:pointer; transition:background 0.15s; border-bottom:1px solid var(--divider); }
    .card:last-child { border-bottom:none; }
    .card:hover, .card.active { background:var(--bg); border-color:transparent; }
    .card-icon { width:34px; height:34px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
    .card-icon.sun { background:var(--sun-bg); }
    .card-icon.shade { background:var(--shade-bg); }
    .card-body { flex:1; min-width:0; }
    .card-name { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:1px; }
    .card-sub { font-size:11px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-badge { flex-shrink:0; font-size:10px; font-weight:600; padding:3px 7px; border-radius:20px; }
    .card-badge.sun { background:var(--sun-bg); color:var(--sun); }
    .card-badge.shade { background:var(--shade-bg); color:var(--shade); }
    .no-results { padding:24px 20px; text-align:center; color:var(--text-3); font-size:13px; line-height:1.6; }

    .drawer-footer { padding:9px 20px; border-top:1px solid var(--divider); display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .footer-text { font-size:10px; color:var(--text-3); }
    .live-dot { width:6px; height:6px; border-radius:50%; background:#30D158; animation:blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .cesium-widget-credits { display:none !important; }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-sun">☀️</div>
  <div class="splash-title">Terrasses<span>.</span></div>
  <div class="splash-sub">Bordeaux</div>
  <div class="splash-loader">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
  <div class="splash-status" id="splashStatus">Chargement de la carte…</div>
</div>

<!-- MAP -->
<div id="cesiumContainer"></div>

<!-- CURSEUR FLOTTANT -->
<div class="panel-map">
  <h3>☀️ <span id="heureAffichee">14h00</span></h3>
  <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25">
</div>

<!-- BOUTON LISTE -->
<button id="btnListe" onclick="openDrawer()">📋 Terrasses</button>

<!-- TOOLTIP -->
<div id="tooltip">
  <div id="ttName"></div>
  <div class="tt-type" id="ttType"></div>
  <div class="tt-sun" id="ttSun"></div>
</div>

<!-- DRAWER -->
<div id="drawer">
  <div class="drawer-handle" id="drawerHandle"><div class="drawer-bar"></div></div>
  <div class="drawer-header">
    <div class="drawer-top">
      <div class="drawer-title">Terrasses<span>.</span></div>
      <button id="btnClose" onclick="closeDrawer()">✕</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher un bar, resto…">
      <button class="search-clear" id="searchClear">✕</button>
    </div>
  </div>
  <div class="section-title">
    <span class="section-label">Terrasses</span>
    <span class="count-pill" id="sunCount">…</span>
  </div>
  <div id="loadingState"><div class="spinner"></div><span>Chargement…</span></div>
  <div class="list" id="terrasseList" style="display:none;"></div>
  <div class="drawer-footer">
    <div class="live-dot"></div>
    <span class="footer-text" id="footerText">Ombres 3D Cesium · OpenStreetMap</span>
  </div>
</div>

<script>
// ── DRAWER ──
const drawer = document.getElementById('drawer');
function openDrawer()  { drawer.classList.add('open'); }
function closeDrawer() { drawer.classList.remove('open'); }
const dhandle = document.getElementById('drawerHandle');
let touchStartY = 0;
dhandle.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive:true });
dhandle.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - touchStartY > 50) closeDrawer(); }, { passive:true });

// ── CESIUM ──
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

const viewer = new Cesium.Viewer('cesiumContainer', {
  terrainProvider: Cesium.createWorldTerrain(),
  skyBox: false, skyAtmosphere: false,
  baseLayerPicker: false, homeButton: false,
  infoBox: false, selectionIndicator: false, // ← supprime le curseur vert
  navigationHelpButton: false, sceneModePicker: false,
  animation: false, timeline: false,
  fullscreenButton: false, geocoder: false,
  scene3DOnly: true,
});

viewer.scene.globe.maximumScreenSpaceError = 4;
viewer.scene.globe.tileCacheSize = 100;
viewer.scene.globe.preloadAncestors = false;
viewer.scene.screenSpaceCameraController.enableZoom = true;
viewer.scene.screenSpaceCameraController.enableRotate = true;
viewer.scene.screenSpaceCameraController.enableTilt = true;
viewer.scene.screenSpaceCameraController.enableTranslate = true;
viewer.scene.globe.enableLighting = true;
viewer.shadows = true;

const osmBuildings = viewer.scene.primitives.add(Cesium.createOsmBuildings());
osmBuildings.maximumScreenSpaceError = 8;

viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(-0.57918, 44.837789, 500),
  orientation: { heading: Cesium.Math.toRadians(0), pitch: Cesium.Math.toRadians(-45), roll: 0.0 }
});

// ── STATE ──
let terrasses = [];
let sunStates = {};
let searchQuery = '';
let currentHeure = 14;
const markerEntities = {};

// ── SPLASH — disparaît quand la map est prête ──
function hideSplash() {
  const splash = document.getElementById('splash');
  splash.classList.add('fade-out');
  setTimeout(() => { splash.style.display = 'none'; }, 650);
}

// On attend que le globe soit chargé et les premières tuiles visibles
let splashGone = false;
viewer.scene.globe.tileLoadProgressEvent.addEventListener(remaining => {
  if (!splashGone) {
    document.getElementById('splashStatus').textContent =
      remaining > 0 ? `Chargement de la carte… (${remaining})` : 'Presque prêt…';
  }
});

// Dès que les tuiles principales sont chargées → cacher le splash
viewer.scene.postRender.addEventListener(function checkReady() {
  if (splashGone) return;
  if (viewer.scene.globe.tilesLoaded) {
    splashGone = true;
    viewer.scene.postRender.removeEventListener(checkReady);
    hideSplash();
  }
});

// Fallback : max 4 secondes de splash quoi qu'il arrive
setTimeout(() => {
  if (!splashGone) { splashGone = true; hideSplash(); }
}, 4000);

// ── OVERPASS ──
const BBOX = '44.820,-0.605,44.875,-0.535';
const QUERY = `[out:json][timeout:30];
(
  node["amenity"="bar"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="cafe"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="restaurant"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="pub"]["outdoor_seating"="yes"](${BBOX});
  node["amenity"="biergarten"](${BBOX});
  node["amenity"="bar"](${BBOX});
  node["amenity"="cafe"](${BBOX});
  node["amenity"="restaurant"](${BBOX});
);
out body;`;

function typeLabel(a) {
  return { bar:'Bar', cafe:'Café', restaurant:'Restaurant', pub:'Pub', biergarten:'Brasserie' }[a] || 'Terrasse';
}

async function fetchTerrasses() {
  const res = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST', body: 'data=' + encodeURIComponent(QUERY)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  const seen = new Set();
  return data.elements
    .filter(el => el.lat && el.lon && el.tags && el.tags.name
      && !seen.has(el.tags.name) && seen.add(el.tags.name))
    .map(el => ({
      id: el.id,
      nom: el.tags.name,
      adresse: el.tags['addr:street']
        ? ((el.tags['addr:housenumber']||'') + ' ' + el.tags['addr:street']).trim()
        : 'Bordeaux',
      type: typeLabel(el.tags.amenity),
      lng: el.lon, lat: el.lat,
    }));
}

// ── RAY CASTING ──
function getSunDir(jd) {
  const sunIcrf = Cesium.Simon1994PlanetaryPositions.computeSunPositionInEarthInertialFrame(jd);
  const mtx = Cesium.Transforms.computeIcrfToFixedMatrix(jd);
  if (!mtx) return null;
  const dir = new Cesium.Cartesian3();
  Cesium.Matrix3.multiplyByVector(mtx, sunIcrf, dir);
  return Cesium.Cartesian3.normalize(dir, dir);
}

function checkSunny(t, sunDir) {
  if (!sunDir) return false;
  const pos = Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 1.5);
  const up  = Cesium.Cartesian3.normalize(pos, new Cesium.Cartesian3());
  if (Cesium.Cartesian3.dot(sunDir, up) <= 0.05) return false;
  const ray = new Cesium.Ray(pos, sunDir);
  const hit = viewer.scene.pickFromRay(ray, Object.values(markerEntities));
  return !hit;
}

let shadowDebounce = null;
let computing = false;

function scheduleShadow() {
  clearTimeout(shadowDebounce);
  shadowDebounce = setTimeout(() => {
    const unsub = viewer.scene.postRender.addEventListener(() => {
      unsub();
      if (!computing) runShadow();
    });
  }, 500);
}

async function runShadow() {
  computing = true;
  const jd = viewer.clock.currentTime;
  viewer.scene.render(jd);
  const sunDir = getSunDir(jd);
  const BATCH = 10;
  for (let i = 0; i < terrasses.length; i += BATCH) {
    viewer.scene.render(jd);
    for (const t of terrasses.slice(i, i + BATCH)) {
      sunStates[t.id] = checkSunny(t, sunDir);
    }
    syncDots();
    renderList(currentHeure, searchQuery);
    await new Promise(r => setTimeout(r, 0));
  }
  computing = false;
}

// ── DOTS ──
function makeDot(sunny) {
  const c = document.createElement('canvas');
  c.width = 16; c.height = 16;
  const ctx = c.getContext('2d');
  ctx.beginPath(); ctx.arc(8,8,7,0,Math.PI*2);
  ctx.fillStyle = sunny ? 'rgba(255,149,0,0.22)' : 'rgba(142,155,173,0.18)';
  ctx.fill();
  ctx.beginPath(); ctx.arc(8,8,4,0,Math.PI*2);
  ctx.fillStyle = sunny ? '#FF9500' : '#8E9BAD';
  ctx.fill();
  ctx.beginPath(); ctx.arc(8,8,4,0,Math.PI*2);
  ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5; ctx.stroke();
  return c.toDataURL();
}
const DOT_SUN   = makeDot(true);
const DOT_SHADE = makeDot(false);

function syncDots() {
  terrasses.forEach(t => {
    const sunny = sunStates[t.id] === true;
    if (!markerEntities[t.id]) {
      markerEntities[t.id] = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 2),
        billboard: {
          image: sunny ? DOT_SUN : DOT_SHADE,
          verticalOrigin: Cesium.VerticalOrigin.CENTER,
          heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
          width: 16, height: 16,
          disableDepthTestDistance: Number.POSITIVE_INFINITY
        },
        properties: { id: t.id }
      });
    } else {
      markerEntities[t.id].billboard.image = sunny ? DOT_SUN : DOT_SHADE;
    }
  });
}

// ── TOOLTIP ──
const tooltip = document.getElementById('tooltip');
let tooltipTimeout = null;

function showTooltip(t, x, y) {
  const sunny = sunStates[t.id] === true;
  document.getElementById('ttName').textContent = t.nom;
  document.getElementById('ttType').textContent = t.type + ' · ' + t.adresse;
  const ttSun = document.getElementById('ttSun');
  ttSun.textContent = sunny ? '☀ Au soleil' : '🌥 À l\'ombre';
  ttSun.className = 'tt-sun ' + (sunny ? 'sun' : 'shade');
  const tw = 220;
  tooltip.style.left = Math.min(Math.max(x - tw/2, 10), window.innerWidth - tw - 10) + 'px';
  tooltip.style.top  = Math.max(y - 95, 10) + 'px';
  tooltip.classList.add('visible');
  clearTimeout(tooltipTimeout);
  tooltipTimeout = setTimeout(() => tooltip.classList.remove('visible'), 3000);
}

function hideTooltip() {
  clearTimeout(tooltipTimeout);
  tooltip.classList.remove('visible');
}

// ── HELPERS ──
function normalize(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function highlight(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
    '<mark style="background:var(--sun-bg);color:var(--sun);border-radius:3px;padding:0 2px">$1</mark>');
}
function sunPhaseLabel(h) {
  if (h<10) return "Matinée"; if (h<12) return "Mi-mat.";
  if (h<14) return "Midi";    if (h<17) return "Après-midi";
  if (h<20) return "Fin d'ap."; return "Soirée";
}

// ── RENDER LIST ──
function renderList(h, query) {
  const list = document.getElementById('terrasseList');
  const countEl = document.getElementById('sunCount');
  const q = normalize(query||'');
  let filtered = terrasses;
  if (q) filtered = terrasses.filter(t =>
    normalize(t.nom).includes(q)||normalize(t.type).includes(q)||normalize(t.adresse).includes(q));
  const sorted = [...filtered].sort((a,b)=>(sunStates[b.id]?1:0)-(sunStates[a.id]?1:0));
  const sunnyN = filtered.filter(t=>sunStates[t.id]===true).length;
  countEl.textContent = q ? `${sorted.length} résultat${sorted.length>1?'s':''}` : `${sunnyN} au soleil`;
  list.innerHTML = '';
  if (!sorted.length) { list.innerHTML=`<div class="no-results">Aucun résultat pour<br><strong>"${query}"</strong></div>`; return; }
  sorted.forEach(t => {
    const s = sunStates[t.id]===true;
    const card = document.createElement('div');
    card.className='card'; card.dataset.id=t.id;
    card.innerHTML=`
      <div class="card-icon ${s?'sun':'shade'}">${s?'☀️':'🌥'}</div>
      <div class="card-body">
        <div class="card-name">${highlight(t.nom,query)}</div>
        <div class="card-sub">${t.type} · ${t.adresse}</div>
      </div>
      <div class="card-badge ${s?'sun':'shade'}">${s?'Soleil':'Ombre'}</div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
      closeDrawer();
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 220),
        orientation: { heading:0, pitch:Cesium.Math.toRadians(-38), roll:0 }, duration:1.4
      });
    });
    list.appendChild(card);
  });
}

// ── SEARCH ──
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
searchInput.addEventListener('input', e => {
  searchQuery = e.target.value;
  searchClear.classList.toggle('visible', searchQuery.length>0);
  renderList(currentHeure, searchQuery);
});
searchClear.addEventListener('click', () => {
  searchInput.value=''; searchQuery='';
  searchClear.classList.remove('visible');
  renderList(currentHeure,'');
});

// ── SLIDER ──
const slider = document.getElementById('timeSlider');
slider.addEventListener('input', e => {
  const val = parseFloat(e.target.value);
  const h = Math.floor(val), m = Math.round((val-h)*60);
  document.getElementById('heureAffichee').textContent = h+'h'+(m<10?'0'+m:m);
  slider.style.setProperty('--pct', ((val-8)/13)*100+'%');
  const date = new Date(); date.setHours(h, m, 0, 0);
  viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
  currentHeure = val;
  hideTooltip();
  if (terrasses.length>0) scheduleShadow();
});

// ── CLICK DOT → tooltip ──
const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
handler.setInputAction(click => {
  const picked = viewer.scene.pick(click.position);
  if (Cesium.defined(picked) && picked.id) {
    const id = picked.id.properties?.id?.getValue();
    const t  = terrasses.find(x => String(x.id)===String(id));
    if (t) {
      showTooltip(t, click.position.x, click.position.y);
      document.querySelectorAll('.card').forEach(c =>
        c.classList.toggle('active', String(c.dataset.id)===String(id)));
      return;
    }
  }
  hideTooltip();
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// ── BOOT ──
async function init() {
  const maintenant = new Date();
  const heureDecimale = maintenant.getHours() + (Math.round(maintenant.getMinutes()/15)*15/60);
  slider.value = Math.min(21, Math.max(8, heureDecimale));
  slider.dispatchEvent(new Event('input'));

  let data;
  try { data = await fetchTerrasses(); }
  catch(e) {
    document.getElementById('loadingState').style.display='none';
    document.getElementById('terrasseList').style.display='block';
    document.getElementById('terrasseList').innerHTML=
      `<div class="no-results">Erreur de chargement.<br>Vérifiez votre connexion.</div>`;
    return;
  }

  document.getElementById('loadingState').style.display='none';
  document.getElementById('terrasseList').style.display='block';
  terrasses = data;
  terrasses.forEach(t => { sunStates[t.id]=false; });
  document.getElementById('footerText').textContent=`${terrasses.length} terrasses · OpenStreetMap`;
  renderList(currentHeure,'');

  viewer.scene.postRender.addEventListener(function once() {
    viewer.scene.postRender.removeEventListener(once);
    runShadow();
  });
}

init();
</script>
