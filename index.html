<script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
  body { margin: 0; padding: 0; overflow: hidden; }
  #cesiumContainer { width: 100vw; height: 100vh; }
  .panel {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: white; padding: 12px 20px; border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 10;
    font-family: sans-serif;
  }
</style>

<div id="cesiumContainer"></div>
<div class="panel">
  <div style="font-weight: bold; margin-bottom: 5px;">☀️ <span id="heureAffichee">14h00</span></div>
  <input type="range" id="timeSlider" min="8" max="21" value="14" step="0.25" style="width:200px;">
</div>

<script>
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMWJkNDg1OC1kNTEzLTRiMWMtYjM2MC1hMDUzMDQzMDhmODgiLCJpZCI6Mzk5MDkxLCJpYXQiOjE3NzI3ODMwMDN9.XuZCIyBxFwS7zCRDGZCih0HDKYQ2FdyJ0l1nIyZaiEY';

  const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.createWorldTerrain(),
      baseLayerPicker: false, infoBox: false, skyBox: false, skyAtmosphere: false,
      navigationHelpButton: false, sceneModePicker: false, timeline: false, animation: false,
      geocoder: false, selectionIndicator: false, homeButton: false
  });

  viewer.scene.globe.enableLighting = true;
  viewer.shadows = true;
  viewer.scene.primitives.add(Cesium.createOsmBuildings());

  // --- LES MARQUEURS TYPE MAPS ---
  function ajouterPin(nom, lat, lng) {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lng, lat),
      billboard: {
        image: 'https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Assets/Textures/pin.png', 
        color: Cesium.Color.fromCssColorString('#EA4335'), // Rouge Google Maps
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        width: 32, height: 32,
        disableDepthTestDistance: Number.POSITIVE_INFINITY // Pour que l'épingle soit toujours visible
      },
      label: {
        text: nom,
        font: '14px sans-serif',
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        outlineWidth: 2,
        verticalOrigin: Cesium.VerticalOrigin.TOP,
        pixelOffset: new Cesium.Cartesian2(0, 5)
      }
    });
  }

  // Coordonnées ajustées pour être pile sur les bâtiments
  ajouterPin("L'Avant Comptoir", 44.83845, -0.56930);
  ajouterPin("Les Frères Cailloux", 44.83870, -0.56900);

  viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(-0.5692, 44.8384, 150),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-35), roll: 0 }
  });

  const slider = document.getElementById('timeSlider');
  slider.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      const h = Math.floor(val);
      const m = Math.round((val - h) * 60);
      document.getElementById('heureAffichee').innerText = h + "h" + (m < 10 ? '0' + m : m);
      const d = new Date(); d.setHours(h, m, 0, 0);
      viewer.clock.currentTime = Cesium.JulianDate.fromDate(d);
  });
</script>
